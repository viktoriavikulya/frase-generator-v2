<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Curador archivo_x</title>
  <style>
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #080808;
      --text: #d9d3c9;
      --text-title: #e8e2d9;
      --text-label: #666;
      --text-hint: #444;
      --text-muted: #555;
      --border: #1e1e1e;
      --border-focus: #666;
      --placeholder: #333;
      --btn-main-bg: #e8e2d9;
      --btn-main-fg: #080808;
      --status-ok: #4a7a4a;
      --status-err: #7a3030;
      --status-warn: #9b8430;
      --toggle-bg: #222;
      --toggle-knob: #d9d3c9;
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f5f2ee;
      --text: #2a2520;
      --text-title: #1a1510;
      --text-label: #888;
      --text-hint: #aaa;
      --text-muted: #999;
      --border: #ddd;
      --border-focus: #888;
      --placeholder: #bbb;
      --btn-main-bg: #1a1510;
      --btn-main-fg: #f5f2ee;
      --status-ok: #2e6e2e;
      --status-err: #8b2020;
      --status-warn: #8a6d1d;
      --toggle-bg: #ddd;
      --toggle-knob: #1a1510;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 56px 24px 80px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 8px 0 10px;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--placeholder);
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-bottom-color: var(--border-focus);
    }

    textarea {
      resize: vertical;
      line-height: 1.7;
      min-height: 58px;
      max-height: 140px;
    }

    select {
      min-height: 38px;
    }

    option {
      background: var(--bg);
      color: var(--text);
    }

    .shell {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    header {
      margin-bottom: 36px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 36px;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .toggle-icon {
      font-size: 13px;
      color: var(--text-label);
      width: 16px;
      text-align: center;
      transition: color 0.25s;
    }

    .toggle-track {
      width: 40px;
      height: 22px;
      background: var(--toggle-bg);
      border-radius: 999px;
      position: relative;
      transition: background 0.25s;
    }

    .toggle-knob {
      width: 16px;
      height: 16px;
      background: var(--toggle-knob);
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.25s, background 0.25s;
    }

    [data-theme="light"] .toggle-knob {
      transform: translateX(18px);
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      font-weight: 400;
      line-height: 1.15;
      color: var(--text-title);
    }

    .subtitle {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .chip {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0 12px;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .filters {
      display: grid;
      grid-template-columns: 150px 220px minmax(0, 1fr) 120px;
      gap: 18px;
      align-items: end;
      margin-bottom: 32px;
    }

    .main {
      display: block;
    }

    .panel {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .phrase-panel {
      min-height: 620px;
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta strong {
      color: var(--text-title);
    }

    /* chip de decisión con color según estado */
    .chip.decision-pendiente  { color: var(--status-warn); }
    .chip.decision-aprobada   { color: var(--status-ok); }
    .chip.decision-descartada { color: var(--status-err); }

    .phrase-box {
      padding: 36px 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(28px, 5vw, 56px);
      line-height: 1.08;
      letter-spacing: 0;
      min-height: 220px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      word-wrap: break-word;
      color: var(--text-title);
    }

    .decision-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
    }

    .group-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 2px;
    }

    .group-btn {
      min-height: 34px;
      padding: 0 12px;
      color: var(--text-label);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-color: var(--border);
    }

    .group-btn:hover {
      color: var(--text);
      border-color: var(--border-focus);
    }

    .group-btn.active {
      background: var(--btn-main-bg);
      border-color: var(--btn-main-bg);
      color: var(--btn-main-fg);
    }

    .temporalidad-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .temporalidad-btn {
      min-height: 34px;
      padding: 0 10px;
      color: var(--text-label);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-color: var(--border);
    }

    .temporalidad-btn.active {
      background: var(--btn-main-bg);
      border-color: var(--btn-main-bg);
      color: var(--btn-main-fg);
    }

    .decision-btn {
      min-height: 48px;
      padding: 0 12px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .decision-btn.pending {
      color: var(--status-warn);
    }

    .decision-btn.pending.active {
      background: var(--status-warn);
      color: var(--bg);
    }

    .decision-btn.approved {
      color: var(--status-ok);
    }

    .decision-btn.approved.active {
      background: var(--status-ok);
      color: var(--bg);
    }

    .decision-btn.rejected {
      color: var(--status-err);
    }

    .decision-btn.rejected.active {
      background: var(--status-err);
      color: var(--text-title);
    }

    .editor {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 28px;
      padding: 22px 0;
    }

    .field-wide {
      grid-column: 1 / -1;
    }

    label {
      display: grid;
      gap: 10px;
      color: var(--text-label);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding: 20px 0 0;
      flex-wrap: wrap;
    }

    .action-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 46px;
      padding: 0 18px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .btn.primary {
      border-color: var(--btn-main-bg);
      background: var(--btn-main-bg);
      color: var(--btn-main-fg);
    }

    .btn.primary:disabled {
      opacity: 0.7;
    }

    .btn.ghost {
      background: transparent;
      color: var(--text-label);
    }

    .btn.sm {
      min-height: 32px;
      padding: 0 10px;
      font-size: 13px;
    }

    .status-line {
      min-height: 20px;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .empty {
      min-height: 400px;
      display: grid;
      place-items: center;
      color: var(--text-muted);
      text-align: center;
      padding: 28px;
    }

    .temporality-group {
      display: grid;
      gap: 8px;
    }

    /* ─── vistas (Curaduría / Publicar carruseles) ──────────────────────────── */

    .view-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .view-tab {
      min-height: 38px;
      padding: 0 16px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-label);
      border-color: var(--border);
    }

    .view-tab:hover {
      color: var(--text);
      border-color: var(--border-focus);
    }

    .view-tab.active {
      background: var(--btn-main-bg);
      border-color: var(--btn-main-bg);
      color: var(--btn-main-fg);
    }

    /* ─── Publicar carruseles ────────────────────────────────────────────────── */

    .plan-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }

    .plan-tab {
      min-height: 36px;
      padding: 0 14px;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--text-label);
      border-color: var(--border);
    }

    .plan-tab:hover {
      color: var(--text);
      border-color: var(--border-focus);
    }

    .plan-tab.active {
      background: var(--btn-main-bg);
      border-color: var(--btn-main-bg);
      color: var(--btn-main-fg);
    }

    .plan-list {
      display: grid;
      border-top: 1px solid var(--border);
    }

    .plan-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .plan-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 3px 0 0;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: var(--btn-main-bg);
    }

    .plan-item .plan-text {
      flex: 1;
      line-height: 1.6;
      font-size: 15px;
    }

    .plan-item .plan-row {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .plan-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 24px 0 28px;
      flex-wrap: wrap;
    }

    .plan-fields {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      margin-bottom: 24px;
    }

    .color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 1.5px solid transparent;
      flex-shrink: 0;
      transition: transform 0.15s, border-color 0.15s;
    }

    .swatch:hover {
      transform: scale(1.18);
    }

    .swatch.selected {
      border-color: var(--text-title);
      transform: scale(1.18);
    }

    .swatch.aleatorio {
      background: conic-gradient(#ff6b6b 0deg, #f4c400 90deg, #3d5afe 180deg, #e91e63 270deg, #ff6b6b 360deg);
    }

    .selected-label {
      font-size: 11px;
      color: var(--text-muted);
      min-height: 16px;
      letter-spacing: 0.04em;
      margin-top: 8px;
    }

    .result-box {
      margin-top: 20px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.6;
    }

    .result-box.ok {
      border-color: var(--status-ok);
      color: var(--status-ok);
    }

    .result-box.warn {
      border-color: var(--status-warn);
      color: var(--status-warn);
    }

    .result-box.err {
      border-color: var(--status-err);
      color: var(--status-err);
    }

    .radio-option {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .radio-option input[type="radio"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      margin: 0;
    }

    .radio-option label {
      margin: 0;
      cursor: pointer;
      flex: 1;
    }

    @media (max-width: 1100px) {
      .filters {
        grid-template-columns: 1fr;
      }

      .decision-buttons,
      .editor {
        grid-template-columns: 1fr;
      }

      .stats {
        justify-content: flex-start;
      }

      .phrase-box {
        min-height: 160px;
        font-size: 24px;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: 100%;
      }

      h1 {
        font-size: 28px;
      }

      .stats {
        flex-direction: column;
        gap: 4px;
      }

      .chip {
        min-height: 28px;
        font-size: 12px;
        padding: 0 10px;
      }

      .filters {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .panel-head {
        padding: 12px 0;
      }

      .phrase-box {
        padding: 24px 0;
        font-size: 28px;
        min-height: 140px;
      }

      .decision-buttons {
        grid-template-columns: 1fr;
        padding: 14px 0;
        gap: 8px;
      }

      .decision-btn {
        min-height: 44px;
      }

      .editor {
        grid-template-columns: 1fr;
        gap: 22px;
        padding: 24px 0;
      }

      label {
        font-size: 12px;
      }

      input,
      select,
      textarea {
        padding: 10px;
        font-size: 14px;
      }

      textarea {
        min-height: 58px;
      }

      .actions {
        flex-direction: column;
        gap: 10px;
        padding: 18px 0 0;
      }

      .action-group {
        width: 100%;
      }

      .action-group button {
        flex: 1;
      }

      .btn {
        min-height: 36px;
        padding: 0 12px;
        font-size: 13px;
      }

      .phrase-panel {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar modo">
        <span class="toggle-icon" id="theme-icon">☽</span>
        <div class="toggle-track"><div class="toggle-knob"></div></div>
      </button>
    </div>

    <header>
      <div>
        <h1>Curador de archivo_x</h1>
        <div class="subtitle" id="worksheetLabel">Cargando archivo editorial</div>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <div class="view-tabs">
      <button type="button" class="btn view-tab active" data-view="curacion">Curaduría</button>
      <button type="button" class="btn view-tab" data-view="publicar">Publicar carruseles</button>
    </div>

    <div id="viewCuracion">
      <section class="filters">
        <!-- Opciones alineadas con decision_editorial del nuevo flujo manual -->
        <select id="filterSelect" aria-label="Filtro">
          <option value="pending">Pendientes</option>
          <option value="approved">Aprobadas</option>
          <option value="rejected">Descartadas</option>
          <option value="all">Todas</option>
        </select>
        <select id="groupFilter" aria-label="Grupo">
          <option value="">Todos los grupos</option>
        </select>
        <input id="searchInput" type="search" placeholder="Buscar frase">
        <button class="btn ghost" id="reloadBtn" type="button">Actualizar</button>
      </section>

      <main class="main">
        <section class="panel phrase-panel" id="phrasePanel">
          <div class="empty">Cargando frases...</div>
        </section>
      </main>
    </div>

    <div id="viewPublicar" style="display: none;">
      <section class="panel" style="border-top: none; padding-bottom: 28px;">
        <div class="plan-tabs" id="planTabs"></div>

        <div class="plan-list" id="planList">
          <div class="empty">Cargando plan_carruseles...</div>
        </div>

        <div class="plan-toolbar">
          <span class="chip" id="planCounter"><strong>0</strong>&nbsp;/&nbsp;10 seleccionadas</span>
          <button class="btn ghost" id="planReloadBtn" type="button">Actualizar</button>
        </div>

        <div class="plan-fields">
          <label class="field-wide">
            caption (obligatorio)
            <textarea id="planCaption" rows="2" placeholder="🖤 monacastrosa"></textarea>
          </label>
          <label class="field-wide">
            color (opcional)
            <div class="color-grid" id="planColorGrid"></div>
            <p class="selected-label" id="planColorLabel">Aleatorio</p>
          </label>
        </div>

        <div class="actions" style="border-top: none; padding-top: 0;">
          <div class="action-group"></div>
          <div class="status-line" id="planStatusLine"></div>
          <div class="action-group">
            <button class="btn primary" id="planRegisterBtn" type="button" disabled>Registrar para publicación</button>
          </div>
        </div>

        <div id="planResult"></div>
      </section>
    </div>
  </div>

  <script>
    /**
     * Curador archivo_x — Flujo 100% manual
     *
     * Modelo de decisiones:
     *   decision_editorial: "pendiente" | "aprobada" | "descartada"
     *
     * Reglas estrictas:
     *   - Solo el botón "Aprobar"   pone decision_editorial = aprobada
     *   - Solo el botón "Descartar" pone decision_editorial = descartada
     *   - Solo el botón "Pendiente" pone decision_editorial = pendiente
     *   - Cambiar grupo NO cambia decision_editorial
     *   - Editar frase_final NO cambia decision_editorial
     *   - El Sheet solo se actualiza con "Guardar y siguiente"
     */

    const state = {
      items: [],
      filtered: [],
      taxonomy: [],
      index: 0,
      selectedGroup: "",
      selectedTemporalidad: "atemporal",
      selectedDecision: "pendiente",   // "pendiente" | "aprobada" | "descartada"
      saving: false,
      worksheet: "",
      token: ""
    };

    const els = {
      phrasePanel: document.getElementById("phrasePanel"),
      stats: document.getElementById("stats"),
      worksheetLabel: document.getElementById("worksheetLabel"),
      filterSelect: document.getElementById("filterSelect"),
      groupFilter: document.getElementById("groupFilter"),
      searchInput: document.getElementById("searchInput"),
      reloadBtn: document.getElementById("reloadBtn")
    };

    // ─── utilidades ────────────────────────────────────────────────────────────

    function clean(value) {
      return String(value || "").trim();
    }

    function escapeHtml(value) {
      return clean(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function currentItem() {
      return state.filtered[state.index] || null;
    }

    function setStatus(message) {
      const line = document.getElementById("statusLine");
      if (line) line.textContent = message || "";
    }

    function initToken() {
      const params = new URLSearchParams(window.location.search);
      const token = clean(params.get("token"));

      if (token) {
        localStorage.setItem("archive-x-token", token);
        state.token = token;
        params.delete("token");
        const nextQuery = params.toString();
        const nextUrl = `${window.location.pathname}${nextQuery ? `?${nextQuery}` : ""}${window.location.hash}`;
        window.history.replaceState({}, "", nextUrl);
        return;
      }

      state.token = clean(localStorage.getItem("archive-x-token"));
    }

    function apiHeaders(extra = {}) {
      return {
        ...extra,
        ...(state.token ? { "X-Curator-Token": state.token } : {})
      };
    }

    // ─── stats ─────────────────────────────────────────────────────────────────

    function getDecisionSummary() {
      const summary = {
        total: state.items.length,
        pendiente: 0,
        aprobada: 0,
        descartada: 0
      };

      for (const item of state.items) {
        const decision = clean(item.decision_editorial).toLowerCase() || "pendiente";
        if (decision === "aprobada") summary.aprobada += 1;
        else if (decision === "descartada") summary.descartada += 1;
        else summary.pendiente += 1;
      }

      return summary;
    }

    function renderStats(summary = getDecisionSummary()) {
      els.stats.innerHTML = [
        ["Total",       summary?.total      ?? state.items.length],
        ["Pendientes",  summary?.pendiente  ?? 0],
        ["Aprobadas",   summary?.aprobada   ?? 0],
        ["Descartadas", summary?.descartada ?? 0],
        ["Vista",       state.filtered.length]
      ].map(([label, value]) =>
        `<span class="chip"><strong>${value}</strong>&nbsp;${label}</span>`
      ).join("");
    }

    // ─── grupo (sidebar) ───────────────────────────────────────────────────────

    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
      html.setAttribute("data-theme", next);
      document.getElementById("theme-icon").textContent = next === "dark" ? "☽" : "○";
      localStorage.setItem("archive-x-theme", next);
    }

    function initTheme() {
      const saved = localStorage.getItem("archive-x-theme");
      if (saved && saved !== "dark") {
        document.documentElement.setAttribute("data-theme", saved);
        document.getElementById("theme-icon").textContent = "○";
      }
    }

    function renderGroupButtons() {
      const container = document.getElementById("groupButtons");
      if (!container) return;

      const buttons = [{ name: "", hint: "Sin grupo" }, ...state.taxonomy];
      container.innerHTML = buttons.map(group => {
        const active = state.selectedGroup === group.name ? " active" : "";
        const label = group.name || group.hint;
        return `<button type="button" class="group-btn${active}" data-group="${escapeHtml(group.name)}">${escapeHtml(label)}</button>`;
      }).join("");

      container.querySelectorAll(".group-btn").forEach(button => {
        button.addEventListener("click", () => {
          state.selectedGroup = button.dataset.group || "";
          renderGroupButtons();
          setStatus("Cambio pendiente");
        });
      });
    }

    function renderTemporalidadButtons() {
      const container = document.getElementById("temporalidadButtons");
      if (!container) return;

      const options = [
        ["atemporal", "Atemporal"],
        ["temporada", "Temporada"],
        ["coyuntural", "Coyuntural"],
        ["fecha_especial", "Fecha especial"]
      ];

      container.innerHTML = options.map(([value, label]) => {
        const active = state.selectedTemporalidad === value ? " active" : "";
        return `<button type="button" class="temporalidad-btn${active}" data-temporalidad="${value}">${label}</button>`;
      }).join("");

      container.querySelectorAll(".temporalidad-btn").forEach(button => {
        button.addEventListener("click", () => {
          state.selectedTemporalidad = button.dataset.temporalidad || "atemporal";
          renderTemporalidadButtons();
          setStatus("Cambio pendiente");
        });
      });
    }

    // ─── panel principal ───────────────────────────────────────────────────────

    function renderPhrase() {
      const item = currentItem();

      if (!item) {
        els.phrasePanel.innerHTML = '<div class="empty">No hay frases en esta vista.</div>';
        state.selectedGroup = "";
        state.selectedTemporalidad = "atemporal";
        state.selectedDecision = "pendiente";
        renderStats();
        return;
      }

      // Sincronizar state con el item actual
      state.selectedGroup    = clean(item.grupo_carrusel);
      state.selectedTemporalidad = clean(item.temporalidad) || "atemporal";
      state.selectedDecision = clean(item.decision_editorial).toLowerCase() || "pendiente";

      const phrase      = clean(item.frase_original);
      const finalPhrase = clean(item.frase_final) || phrase;
      const notes       = clean(item.notas);
      const temporada   = clean(item.temporada);
      const temporalidad = state.selectedTemporalidad;
      const decision    = state.selectedDecision;

      // Chips del nuevo modelo — sin campos legacy (calidad, riesgo, sirve, estado)
      const decisionLabel = { pendiente: "pendiente", aprobada: "✓ aprobada", descartada: "✗ descartada" }[decision] || decision;
      const rowMeta = [
        { text: `Fila ${item.rowNumber}` },
        { text: decisionLabel, cls: `decision-${decision}` },
        item.grupo_carrusel ? { text: item.grupo_carrusel } : null,
        { text: temporalidad }
      ].filter(Boolean);

      els.phrasePanel.innerHTML = `
        <div class="panel-head">
          <div class="meta">
            ${rowMeta.map(m => `<span class="chip ${m.cls || ""}">${escapeHtml(m.text)}</span>`).join("")}
          </div>
          <div class="chip"><strong>${state.index + 1}</strong>&nbsp;/&nbsp;${state.filtered.length}</div>
        </div>

        <div class="phrase-box">${escapeHtml(phrase)}</div>

        <!-- Botones de decisión editorial — cada uno es la única fuente de verdad -->
        <div class="decision-buttons">
          <button type="button" class="decision-btn pending ${decision === "pendiente" ? "active" : ""}"
                  id="btnPendiente">Pendiente</button>
          <button type="button" class="decision-btn approved ${decision === "aprobada" ? "active" : ""}"
                  id="btnAprobar">Aprobar</button>
          <button type="button" class="decision-btn rejected ${decision === "descartada" ? "active" : ""}"
                  id="btnDescartar">Descartar</button>
        </div>

        <div class="editor">
          <label class="field-wide">
            grupo_carrusel
            <div class="group-buttons" id="groupButtons"></div>
          </label>
          <label class="field-wide">
            temporalidad
            <div class="temporalidad-buttons" id="temporalidadButtons"></div>
          </label>
          <label class="field-wide">
            temporada
            <input id="temporada" type="text" value="${escapeHtml(temporada)}" placeholder="Ej: Navidad, San Valentín, elecciones">
          </label>
          <label>
            frase_final
            <textarea id="finalPhrase" rows="2">${escapeHtml(finalPhrase)}</textarea>
          </label>
          <label>
            notas
            <textarea id="notes" rows="2">${escapeHtml(notes)}</textarea>
          </label>
        </div>

        <div class="actions">
          <div class="action-group">
            <button class="btn ghost" id="prevBtn" type="button">Anterior</button>
            <button class="btn ghost" id="nextBtn" type="button">Siguiente</button>
          </div>
          <div class="status-line" id="statusLine"></div>
          <div class="action-group">
            <button class="btn primary" id="saveNextBtn" type="button">Guardar y siguiente</button>
          </div>
        </div>
      `;

      // Botones de decisión: solo cambian decision_editorial, nada más
      document.getElementById("btnPendiente").addEventListener("click", () => {
        setDraftDecision("pendiente");
      });
      document.getElementById("btnAprobar").addEventListener("click", () => {
        setDraftDecision("aprobada");
      });
      document.getElementById("btnDescartar").addEventListener("click", () => {
        setDraftDecision("descartada");
      });

      // Navegación y guardado de campos editables (frase_final + notas)
      document.getElementById("prevBtn").addEventListener("click", () => move(-1));
      document.getElementById("nextBtn").addEventListener("click", () => move(1));
      document.getElementById("saveNextBtn").addEventListener("click", () => saveCurrentAndAdvance());
      document.getElementById("finalPhrase").addEventListener("input", () => setStatus("Cambio pendiente"));
      document.getElementById("notes").addEventListener("input", () => setStatus("Cambio pendiente"));
      document.getElementById("temporada").addEventListener("input", () => setStatus("Cambio pendiente"));

      renderGroupButtons();
      renderTemporalidadButtons();
      renderStats();
    }

    // ─── filtros ───────────────────────────────────────────────────────────────

    function applyFilters(keepCurrent = true) {
      const previousRow = keepCurrent ? currentItem()?.rowNumber : null;
      const filter = els.filterSelect.value;
      const group  = els.groupFilter.value;
      const search = clean(els.searchInput.value).toLowerCase();

      state.filtered = state.items.filter(item => {
        // Filtrar por decision_editorial (único campo de decisión válido)
        const decision = clean(item.decision_editorial).toLowerCase() || "pendiente";

        if (filter === "pending"  && decision !== "pendiente")  return false;
        if (filter === "approved" && decision !== "aprobada")   return false;
        if (filter === "rejected" && decision !== "descartada") return false;

        if (group && item.grupo_carrusel !== group) return false;

        if (search) {
          const haystack = `${item.frase_original || ""} ${item.frase_final || ""} ${item.notas || ""}`.toLowerCase();
          if (!haystack.includes(search)) return false;
        }

        return true;
      });

      if (previousRow) {
        const nextIndex = state.filtered.findIndex(item => item.rowNumber === previousRow);
        state.index = nextIndex >= 0 ? nextIndex : Math.min(state.index, Math.max(0, state.filtered.length - 1));
      } else {
        state.index = Math.min(state.index, Math.max(0, state.filtered.length - 1));
      }

      renderPhrase();
    }

    // ─── guardado ──────────────────────────────────────────────────────────────

    /**
     * Actualiza solo el borrador local.
     * El Sheet se escribe con "Guardar y siguiente".
     */
    function setDraftDecision(decision) {
      state.selectedDecision = decision;

      document.getElementById("btnPendiente")?.classList.toggle("active", decision === "pendiente");
      document.getElementById("btnAprobar")?.classList.toggle("active", decision === "aprobada");
      document.getElementById("btnDescartar")?.classList.toggle("active", decision === "descartada");
      setStatus("Cambio pendiente");
    }

    async function saveCurrentAndAdvance() {
      await saveCurrent({ decision_editorial: state.selectedDecision }, true);
    }

    /**
     * saveCurrent — guarda frase_final + notas + cualquier campo en `extra`.
     * Si `extra` no incluye decision_editorial, el servidor NO la cambia.
     * Si `extra` incluye decision_editorial, el servidor la valida y actualiza.
     *
     * Nunca envía sirve, estado, clasificado_manual ni campos legacy.
     */
    async function saveCurrent(extra, advance) {
      const item = currentItem();
      if (!item || state.saving) return;

      state.saving = true;
      setStatus("Guardando...");

      const finalPhrase = document.getElementById("finalPhrase")?.value ?? "";
      const notes       = document.getElementById("notes")?.value ?? "";
      const temporada   = document.getElementById("temporada")?.value ?? "";

      // Payload limpio: solo campos del nuevo modelo
      // decision_editorial solo llega si `extra` lo incluye explícitamente
      const payload = {
        grupo_carrusel: state.selectedGroup,
        temporalidad:   state.selectedTemporalidad,
        temporada,
        frase_final:    finalPhrase,
        notas:          notes,
        ...extra   // puede traer { decision_editorial } o { grupo_carrusel } solos
      };

      try {
        const res = await fetch(`/api/phrases/${item.rowNumber}`, {
          method: "PATCH",
          headers: apiHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "No se pudo guardar");

        // Actualizar item en memoria con la respuesta del servidor
        const itemIndex = state.items.findIndex(row => row.rowNumber === item.rowNumber);
        if (itemIndex >= 0) state.items[itemIndex] = data.item;

        state.saving = false;

        if (advance) {
          // Guardar el rowNumber de la frase que acabamos de guardar
          const currentRowNumber = item.rowNumber;

          // Re-aplicar filtros sin preservar posición (el item ya fue actualizado)
          applyFilters(false);

          // Buscar si la frase guardada sigue visible en el filtro
          const sameIndex = state.filtered.findIndex(row => row.rowNumber === currentRowNumber);

          if (sameIndex >= 0 && sameIndex < state.filtered.length - 1) {
            // La frase sigue visible y no es la última — avanzar al siguiente
            state.index = sameIndex + 1;
            renderPhrase();
          } else if (sameIndex >= 0 && state.filtered.length > 1) {
            // Era la última visible — volver a la primera
            state.index = 0;
            renderPhrase();
          } else if (sameIndex < 0 && state.filtered.length > 0) {
            // La frase desapareció del filtro — mantener posición válida
            state.index = Math.min(state.index, state.filtered.length - 1);
            renderPhrase();
          } else {
            // No quedan frases (lista vacía o era la única)
            renderPhrase();
          }
        } else {
          applyFilters(true);
          setStatus("Guardado");
        }
      } catch (err) {
        state.saving = false;
        setStatus(err.message || String(err));
      }
    }

    // ─── navegación ────────────────────────────────────────────────────────────

    function move(delta) {
      if (!state.filtered.length) return;
      state.index = Math.max(0, Math.min(state.filtered.length - 1, state.index + delta));
      renderPhrase();
    }

    // ─── filtro de grupo ───────────────────────────────────────────────────────

    function renderGroupFilter() {
      const current = els.groupFilter.value;
      els.groupFilter.innerHTML = '<option value="">Todos los grupos</option>';
      for (const group of state.taxonomy) {
        const option = document.createElement("option");
        option.value = group.name;
        option.textContent = group.name;
        els.groupFilter.appendChild(option);
      }
      els.groupFilter.value = current;
    }

    // ─── carga inicial ─────────────────────────────────────────────────────────

    async function load() {
      els.phrasePanel.innerHTML = '<div class="empty">Cargando frases...</div>';

      const res = await fetch("/api/phrases", {
        headers: apiHeaders()
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "No se pudo cargar archivo_x");

      state.items     = data.items    || [];
      state.taxonomy  = data.taxonomy || [];
      state.worksheet = data.worksheet || "archivo_x";

      els.worksheetLabel.textContent = `Pestaña: ${state.worksheet}`;
      renderGroupFilter();
      renderStats(data.summary);
      applyFilters(false);
    }

    function showFatal(err) {
      els.phrasePanel.innerHTML = `<div class="empty">${escapeHtml(err.message || String(err))}</div>`;
    }

    // ─── Publicar carruseles (plan_carruseles) ────────────────────────────────

    const COLORES = [
      { hex: null,      label: "Aleatorio" },
      { hex: "#f6f1e8", label: "retroWhite" },
      { hex: "#0d0f14", label: "retroBlack" },
      { hex: "#f4c400", label: "retroYellow" },
      { hex: "#3d5afe", label: "retroBlue" },
      { hex: "#e53935", label: "retroRed" },
      { hex: "#0d0208", label: "retroWine" },
      { hex: "#1a0033", label: "retroPurple" },
      { hex: "#0a1628", label: "retroNavy" },
      { hex: "#1c0a00", label: "retroCoffee" },
      { hex: "#d9723e", label: "retroOrange" },
      { hex: "#d4006a", label: "retroPink" },
      { hex: "#b28c2c", label: "retroMustard" },
      { hex: "#2e7d32", label: "retroGreen" },
      { hex: "#2c4a3e", label: "retroForest" },
      { hex: "#4a2040", label: "retroPlum" },
      { hex: "#5c3317", label: "retroToasted" },
      { hex: "#2e3f5c", label: "retroSlate" },
      { hex: "#7a0020", label: "retroCrimson" },
      { hex: "#b85c38", label: "retroTerra" },
      { hex: "#5c3d8f", label: "retroLavender" },
      { hex: "#4a5c2e", label: "retroOlive" },
      { hex: "#c8e6c9", label: "retroMint" },
      { hex: "#b3d9f2", label: "retroSky" },
      { hex: "#d6cfc4", label: "retroAsh" },
      { hex: "#0a0f0a", label: "retroNeon" },
      { hex: "#00695c", label: "retroTeal" },
      { hex: "#2e2e2e", label: "retroGrayDark" },
      { hex: "#f8bbd0", label: "retroBabyPink" },
      { hex: "#76c442", label: "retroLime" },
      { hex: "#1565c0", label: "retroSkyDeep" }
    ];

    const planState = {
      groups: {},
      activeGroup: "",
      selected: new Set(),
      color: null,
      loaded: false
    };

    const planEls = {
      tabs: document.getElementById("planTabs"),
      list: document.getElementById("planList"),
      counter: document.getElementById("planCounter"),
      caption: document.getElementById("planCaption"),
      colorGrid: document.getElementById("planColorGrid"),
      colorLabel: document.getElementById("planColorLabel"),
      registerBtn: document.getElementById("planRegisterBtn"),
      statusLine: document.getElementById("planStatusLine"),
      result: document.getElementById("planResult"),
      reloadBtn: document.getElementById("planReloadBtn")
    };

    function initPlanColors() {
      planEls.colorGrid.innerHTML = "";
      COLORES.forEach(({ hex, label }) => {
        const swatch = document.createElement("div");
        swatch.className = "swatch" + (hex === null ? " aleatorio selected" : "");
        if (hex !== null) swatch.style.background = hex;
        swatch.title = label;
        swatch.addEventListener("click", () => selectPlanColor(hex, label, swatch));
        planEls.colorGrid.appendChild(swatch);
      });
    }

    function selectPlanColor(hex, label, el) {
      planEls.colorGrid.querySelectorAll(".swatch").forEach(s => s.classList.remove("selected"));
      el.classList.add("selected");
      planState.color = hex;
      planEls.colorLabel.textContent = label;
    }

    function renderPlanTabs() {
      const groupNames = Object.keys(planState.groups);

      if (!groupNames.length) {
        planEls.tabs.innerHTML = "";
        return;
      }

      if (!groupNames.includes(planState.activeGroup)) {
        planState.activeGroup = groupNames[0];
      }

      planEls.tabs.innerHTML = groupNames.map(name => {
        const active = name === planState.activeGroup ? " active" : "";
        const count = planState.groups[name].length;
        return `<button type="button" class="btn plan-tab${active}" data-group="${escapeHtml(name)}">${escapeHtml(name)} (${count})</button>`;
      }).join("");

      planEls.tabs.querySelectorAll(".plan-tab").forEach(button => {
        button.addEventListener("click", () => {
          planState.activeGroup = button.dataset.group;
          renderPlanTabs();
          renderPlanList();
        });
      });
    }

    function renderPlanList() {
      const items = planState.groups[planState.activeGroup] || [];

      if (!items.length) {
        planEls.list.innerHTML = '<div class="empty">No hay frases disponibles en plan_carruseles.</div>';
        updatePlanCounter();
        return;
      }

      planEls.list.innerHTML = items.map(item => {
        const text = clean(item.frase_final) || clean(item.frase_original);
        const checked = planState.selected.has(item.rowNumber) ? " checked" : "";
        return `
          <label class="plan-item">
            <input type="checkbox" data-row="${item.rowNumber}"${checked}>
            <span class="plan-text">${escapeHtml(text)}</span>
            <span class="plan-row">Fila ${item.rowNumber}</span>
          </label>
        `;
      }).join("");

      planEls.list.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
        checkbox.addEventListener("change", () => {
          const row = Number(checkbox.dataset.row);
          if (checkbox.checked) planState.selected.add(row);
          else planState.selected.delete(row);
          updatePlanCounter();
        });
      });

      updatePlanCounter();
    }

    function updatePlanCounter() {
      const count = planState.selected.size;
      planEls.counter.innerHTML = `<strong>${count}</strong>&nbsp;/&nbsp;10 seleccionadas`;

      const captionFilled = clean(planEls.caption.value).length > 0;
      planEls.registerBtn.disabled = count !== 10 || !captionFilled;
    }

    async function loadPlanCarruseles() {
      planEls.list.innerHTML = '<div class="empty">Cargando plan_carruseles...</div>';
      planEls.result.innerHTML = "";

      const res = await fetch("/api/plan-carruseles", {
        headers: apiHeaders()
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "No se pudo cargar plan_carruseles");

      planState.groups = data.groups || {};
      planState.selected.clear();
      planState.loaded = true;

      renderPlanTabs();
      renderPlanList();
    }

    async function registrarCarrusel() {
      if (planEls.registerBtn.disabled) return;

      const rowNumbers = [...planState.selected];
      const caption = clean(planEls.caption.value);

      planEls.registerBtn.disabled = true;
      planEls.statusLine.textContent = "Registrando...";
      planEls.result.innerHTML = "";

      try {
        const res = await fetch("/api/plan-carruseles/registrar", {
          method: "POST",
          headers: apiHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({ rowNumbers, caption, color: planState.color || "" })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "No se pudo registrar el carrusel");

        planEls.statusLine.textContent = "";

        let html = `<div class="result-box ok">Registrado con éxito — carouselId: <strong>${escapeHtml(data.carouselId)}</strong> (${data.rowIds?.length || 0} frases, desde la fila ${escapeHtml(String(data.nextRow))} de Hoja 2).</div>`;
        if (data.warning) {
          html += `<div class="result-box warn">${escapeHtml(data.warning)}</div>`;
        }
        planEls.result.innerHTML = html;

        planState.selected.clear();
        planEls.caption.value = "";
        await loadPlanCarruseles();
      } catch (err) {
        planEls.statusLine.textContent = "";
        planEls.result.innerHTML = `<div class="result-box err">${escapeHtml(err.message || String(err))}</div>`;
      } finally {
        updatePlanCounter();
      }
    }

    // ─── vistas ─────────────────────────────────────────────────────────────────

    function switchView(view) {
      document.getElementById("viewCuracion").style.display = view === "curacion" ? "" : "none";
      document.getElementById("viewPublicar").style.display = view === "publicar" ? "" : "none";

      document.querySelectorAll(".view-tab").forEach(tab => {
        tab.classList.toggle("active", tab.dataset.view === view);
      });

      if (view === "publicar" && !planState.loaded) {
        loadPlanCarruseles().catch(err => {
          planEls.list.innerHTML = `<div class="empty">${escapeHtml(err.message || String(err))}</div>`;
        });
      }
    }

    // ─── event listeners ───────────────────────────────────────────────────────

    els.filterSelect.addEventListener("change", () => applyFilters(false));
    els.groupFilter.addEventListener("change",  () => applyFilters(false));
    els.searchInput.addEventListener("input",   () => applyFilters(false));
    els.reloadBtn.addEventListener("click",     () => load().catch(showFatal));

    document.querySelectorAll(".view-tab").forEach(tab => {
      tab.addEventListener("click", () => switchView(tab.dataset.view));
    });

    planEls.caption.addEventListener("input", () => updatePlanCounter());
    planEls.reloadBtn.addEventListener("click", () => {
      loadPlanCarruseles().catch(err => {
        planEls.list.innerHTML = `<div class="empty">${escapeHtml(err.message || String(err))}</div>`;
      });
    });
    planEls.registerBtn.addEventListener("click", () => registrarCarrusel());

    initTheme();
    initToken();
    initPlanColors();
    load().catch(showFatal);
  </script>
</body>
</html>
