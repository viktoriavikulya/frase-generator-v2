<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Curador archivo_x</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ed;
      --panel: #fffaf2;
      --ink: #191714;
      --muted: #6f665a;
      --line: #ded4c4;
      --accent: #0f766e;
      --accent-soft: #d9f3ef;
      --danger: #a52828;
      --danger-soft: #f8dddd;
      --warning: #b89c00;
      --warning-soft: #fef5e0;
      --success: #2d7a4a;
      --success-soft: #e0f1e6;
      --shadow: 0 12px 28px rgba(36, 28, 16, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      border-radius: 8px;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 12px;
    }

    textarea {
      resize: vertical;
      line-height: 1.4;
      min-height: 100px;
    }

    select {
      padding: 12px;
      min-height: 42px;
    }

    .shell {
      width: min(1420px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 20px 0 28px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 0 12px;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .filters {
      display: grid;
      grid-template-columns: 140px 200px 1fr 100px;
      gap: 12px;
      margin-bottom: 20px;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .phrase-panel {
      min-height: 700px;
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta strong {
      color: var(--ink);
    }

    /* chip de decisión con color según estado */
    .chip.decision-pendiente  { border-color: var(--warning); color: var(--warning); }
    .chip.decision-aprobada   { border-color: var(--success); color: var(--success); }
    .chip.decision-descartada { border-color: var(--danger);  color: var(--danger);  }

    .phrase-box {
      padding: 20px;
      font-size: clamp(22px, 3.5vw, 48px);
      line-height: 1.1;
      letter-spacing: 0;
      min-height: 200px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--line);
      word-wrap: break-word;
    }

    .decision-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .decision-btn {
      min-height: 48px;
      border-radius: 8px;
      padding: 0 12px;
      font-weight: 650;
      cursor: pointer;
    }

    .decision-btn.pending {
      border-color: var(--warning);
      background: var(--warning-soft);
      color: var(--ink);
    }

    .decision-btn.pending.active {
      border-color: var(--warning);
      background: var(--warning);
      color: #fff;
    }

    .decision-btn.approved {
      border-color: var(--success);
      background: var(--success-soft);
      color: var(--ink);
    }

    .decision-btn.approved.active {
      border-color: var(--success);
      background: var(--success);
      color: #fff;
    }

    .decision-btn.rejected {
      border-color: var(--danger);
      background: var(--danger-soft);
      color: var(--ink);
    }

    .decision-btn.rejected.active {
      border-color: var(--danger);
      background: var(--danger);
      color: #fff;
    }

    .editor {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px 16px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--line);
      padding: 12px 16px;
      flex-wrap: wrap;
    }

    .action-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 40px;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 650;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .btn.primary:disabled {
      opacity: 0.7;
    }

    .btn.ghost {
      background: transparent;
    }

    .btn.sm {
      min-height: 32px;
      padding: 0 10px;
      font-size: 13px;
    }

    .status-line {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .side {
      display: grid;
      gap: 16px;
    }

    .side-section {
      padding: 14px;
    }

    .side-title {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .group-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
    }

    .group-btn {
      min-height: 42px;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      line-height: 1.2;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }

    .group-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .group-btn:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .group-btn strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
    }

    .group-btn span {
      color: var(--muted);
      font-size: 11px;
    }

    .empty {
      min-height: 400px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 28px;
    }

    .temporality-group {
      display: grid;
      gap: 8px;
    }

    .radio-option {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .radio-option input[type="radio"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      margin: 0;
    }

    .radio-option label {
      margin: 0;
      cursor: pointer;
      flex: 1;
    }

    @media (max-width: 1100px) {
      .main,
      .filters {
        grid-template-columns: 1fr;
      }

      .decision-buttons,
      .editor {
        grid-template-columns: 1fr;
      }

      .stats {
        justify-content: flex-start;
      }

      .phrase-box {
        min-height: 160px;
        font-size: 24px;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: calc(100vw - 16px);
        padding: 16px 0 24px;
      }

      header {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      h1 {
        font-size: 22px;
      }

      .stats {
        flex-direction: column;
        gap: 4px;
      }

      .chip {
        min-height: 28px;
        font-size: 12px;
        padding: 0 10px;
      }

      .filters {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .panel-head {
        padding: 10px 12px;
      }

      .phrase-box {
        padding: 16px 12px;
        font-size: 20px;
        min-height: 140px;
      }

      .decision-buttons {
        grid-template-columns: 1fr;
        padding: 10px;
        gap: 8px;
      }

      .decision-btn {
        min-height: 44px;
      }

      .editor {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 0 12px 12px;
      }

      label {
        font-size: 12px;
      }

      input,
      select,
      textarea {
        padding: 10px;
        font-size: 14px;
      }

      textarea {
        min-height: 80px;
      }

      .actions {
        flex-direction: column;
        gap: 10px;
        padding: 10px;
      }

      .action-group {
        width: 100%;
      }

      .action-group button {
        flex: 1;
      }

      .side-section {
        padding: 12px;
      }

      .side-title {
        font-size: 12px;
        margin: 0 0 8px;
      }

      .group-grid {
        max-height: 300px;
      }

      .group-btn {
        min-height: 40px;
        padding: 8px 10px;
        font-size: 13px;
      }

      .btn {
        min-height: 36px;
        padding: 0 12px;
        font-size: 13px;
      }

      .phrase-panel {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>Curador de archivo_x</h1>
        <div class="subtitle" id="worksheetLabel">Cargando archivo editorial</div>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <section class="filters">
      <!-- Opciones alineadas con decision_editorial del nuevo flujo manual -->
      <select id="filterSelect" aria-label="Filtro">
        <option value="pending">Pendientes</option>
        <option value="approved">Aprobadas</option>
        <option value="rejected">Descartadas</option>
        <option value="all">Todas</option>
      </select>
      <select id="groupFilter" aria-label="Grupo">
        <option value="">Todos los grupos</option>
      </select>
      <input id="searchInput" type="search" placeholder="Buscar frase">
      <button class="btn ghost" id="reloadBtn" type="button">Actualizar</button>
    </section>

    <main class="main">
      <section class="panel phrase-panel" id="phrasePanel">
        <div class="empty">Cargando frases...</div>
      </section>

      <aside class="side">
        <!-- Sidebar de grupo: asignar grupo NO aprueba automáticamente -->
        <section class="panel side-section">
          <p class="side-title">Grupo carrusel</p>
          <div class="group-grid" id="groupGrid"></div>
        </section>
      </aside>
    </main>
  </div>

  <script>
    /**
     * Curador archivo_x — Flujo 100% manual
     *
     * Modelo de decisiones:
     *   decision_editorial: "pendiente" | "aprobada" | "descartada"
     *
     * Reglas estrictas:
     *   - Solo el botón "Aprobar"   pone decision_editorial = aprobada
     *   - Solo el botón "Descartar" pone decision_editorial = descartada
     *   - Solo el botón "Pendiente" pone decision_editorial = pendiente
     *   - Cambiar grupo NO cambia decision_editorial
     *   - Editar frase_final NO cambia decision_editorial
     */

    const state = {
      items: [],
      filtered: [],
      taxonomy: [],
      index: 0,
      selectedGroup: "",
      selectedDecision: "pendiente",   // "pendiente" | "aprobada" | "descartada"
      saving: false,
      worksheet: ""
    };

    const els = {
      phrasePanel: document.getElementById("phrasePanel"),
      stats: document.getElementById("stats"),
      worksheetLabel: document.getElementById("worksheetLabel"),
      filterSelect: document.getElementById("filterSelect"),
      groupFilter: document.getElementById("groupFilter"),
      searchInput: document.getElementById("searchInput"),
      reloadBtn: document.getElementById("reloadBtn"),
      groupGrid: document.getElementById("groupGrid")
    };

    // ─── utilidades ────────────────────────────────────────────────────────────

    function clean(value) {
      return String(value || "").trim();
    }

    function escapeHtml(value) {
      return clean(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function currentItem() {
      return state.filtered[state.index] || null;
    }

    function setStatus(message) {
      const line = document.getElementById("statusLine");
      if (line) line.textContent = message || "";
    }

    // ─── stats ─────────────────────────────────────────────────────────────────

    function renderStats(summary) {
      // El servidor devuelve summary.pendiente / .aprobada / .descartada
      els.stats.innerHTML = [
        ["Total",       summary?.total      ?? state.items.length],
        ["Pendientes",  summary?.pendiente  ?? 0],
        ["Aprobadas",   summary?.aprobada   ?? 0],
        ["Descartadas", summary?.descartada ?? 0],
        ["Vista",       state.filtered.length]
      ].map(([label, value]) =>
        `<span class="chip"><strong>${value}</strong>&nbsp;${label}</span>`
      ).join("");
    }

    // ─── grupo (sidebar) ───────────────────────────────────────────────────────

    function renderGroupButtons() {
      els.groupGrid.innerHTML = "";

      for (const group of state.taxonomy) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `group-btn ${state.selectedGroup === group.name ? "active" : ""}`;
        button.title = group.hint || group.name;
        button.disabled = state.saving;
        button.innerHTML = `<strong>${escapeHtml(group.name)}</strong><span>${escapeHtml(group.hint || "")}</span>`;
        button.addEventListener("click", () => {
          state.selectedGroup = group.name;
          renderGroupButtons();
          // Guardar solo el grupo — NO toca decision_editorial
          saveCurrent({ grupo_carrusel: group.name }, false);
        });
        els.groupGrid.appendChild(button);
      }
    }

    // ─── panel principal ───────────────────────────────────────────────────────

    function renderPhrase() {
      const item = currentItem();

      if (!item) {
        els.phrasePanel.innerHTML = '<div class="empty">No hay frases en esta vista.</div>';
        state.selectedGroup = "";
        state.selectedDecision = "pendiente";
        renderGroupButtons();
        renderStats();
        return;
      }

      // Sincronizar state con el item actual
      state.selectedGroup    = clean(item.grupo_carrusel);
      state.selectedDecision = clean(item.decision_editorial).toLowerCase() || "pendiente";

      const phrase      = clean(item.frase_original);
      const finalPhrase = clean(item.frase_final);
      const notes       = clean(item.notas);
      const temporalidad = clean(item.temporalidad) || "atemporal";
      const decision    = state.selectedDecision;

      // Chips del nuevo modelo — sin campos legacy (calidad, riesgo, sirve, estado)
      const decisionLabel = { pendiente: "pendiente", aprobada: "✓ aprobada", descartada: "✗ descartada" }[decision] || decision;
      const rowMeta = [
        { text: `Fila ${item.rowNumber}` },
        { text: decisionLabel, cls: `decision-${decision}` },
        item.grupo_carrusel ? { text: item.grupo_carrusel } : null,
        { text: temporalidad }
      ].filter(Boolean);

      els.phrasePanel.innerHTML = `
        <div class="panel-head">
          <div class="meta">
            ${rowMeta.map(m => `<span class="chip ${m.cls || ""}">${escapeHtml(m.text)}</span>`).join("")}
          </div>
          <div class="chip"><strong>${state.index + 1}</strong>&nbsp;/&nbsp;${state.filtered.length}</div>
        </div>

        <div class="phrase-box">${escapeHtml(phrase)}</div>

        <!-- Botones de decisión editorial — cada uno es la única fuente de verdad -->
        <div class="decision-buttons">
          <button type="button" class="decision-btn pending ${decision === "pendiente" ? "active" : ""}"
                  id="btnPendiente">Pendiente</button>
          <button type="button" class="decision-btn approved ${decision === "aprobada" ? "active" : ""}"
                  id="btnAprobar">Aprobar</button>
          <button type="button" class="decision-btn rejected ${decision === "descartada" ? "active" : ""}"
                  id="btnDescartar">Descartar</button>
        </div>

        <div class="editor">
          <label>
            frase_final
            <textarea id="finalPhrase">${escapeHtml(finalPhrase)}</textarea>
          </label>
          <label>
            notas
            <textarea id="notes">${escapeHtml(notes)}</textarea>
          </label>
        </div>

        <div class="actions">
          <div class="action-group">
            <button class="btn ghost" id="prevBtn" type="button">Anterior</button>
            <button class="btn ghost" id="nextBtn" type="button">Siguiente</button>
          </div>
          <div class="status-line" id="statusLine"></div>
          <div class="action-group">
            <button class="btn" id="saveBtn" type="button">Guardar</button>
            <button class="btn primary" id="saveNextBtn" type="button">Guardar y siguiente</button>
          </div>
        </div>
      `;

      // Botones de decisión: solo cambian decision_editorial, nada más
      document.getElementById("btnPendiente").addEventListener("click", () => {
        state.selectedDecision = "pendiente";
        saveDecision("pendiente", false);
      });
      document.getElementById("btnAprobar").addEventListener("click", () => {
        state.selectedDecision = "aprobada";
        saveDecision("aprobada", false);
      });
      document.getElementById("btnDescartar").addEventListener("click", () => {
        state.selectedDecision = "descartada";
        saveDecision("descartada", false);
      });

      // Navegación y guardado de campos editables (frase_final + notas)
      document.getElementById("prevBtn").addEventListener("click", () => move(-1));
      document.getElementById("nextBtn").addEventListener("click", () => move(1));
      document.getElementById("saveBtn").addEventListener("click", () => saveCurrent({}, false));
      document.getElementById("saveNextBtn").addEventListener("click", () => saveCurrent({}, true));

      renderGroupButtons();
      renderStats();
    }

    // ─── filtros ───────────────────────────────────────────────────────────────

    function applyFilters(keepCurrent = true) {
      const previousRow = keepCurrent ? currentItem()?.rowNumber : null;
      const filter = els.filterSelect.value;
      const group  = els.groupFilter.value;
      const search = clean(els.searchInput.value).toLowerCase();

      state.filtered = state.items.filter(item => {
        // Filtrar por decision_editorial (único campo de decisión válido)
        const decision = clean(item.decision_editorial).toLowerCase() || "pendiente";

        if (filter === "pending"  && decision !== "pendiente")  return false;
        if (filter === "approved" && decision !== "aprobada")   return false;
        if (filter === "rejected" && decision !== "descartada") return false;

        if (group && item.grupo_carrusel !== group) return false;

        if (search) {
          const haystack = `${item.frase_original || ""} ${item.frase_final || ""} ${item.notas || ""}`.toLowerCase();
          if (!haystack.includes(search)) return false;
        }

        return true;
      });

      if (previousRow) {
        const nextIndex = state.filtered.findIndex(item => item.rowNumber === previousRow);
        state.index = nextIndex >= 0 ? nextIndex : Math.min(state.index, Math.max(0, state.filtered.length - 1));
      } else {
        state.index = Math.min(state.index, Math.max(0, state.filtered.length - 1));
      }

      renderPhrase();
    }

    // ─── guardado ──────────────────────────────────────────────────────────────

    /**
     * saveDecision — guarda decision_editorial junto con los campos editables
     * actuales (frase_final, notas, grupo_carrusel) a través de saveCurrent().
     * Si solo quisieras guardar decision_editorial en aislamiento, tendrías
     * que llamar al endpoint directamente; este helper es conveniente para el
     * flujo normal de curaduría donde el curador ya editó otros campos.
     */
    async function saveDecision(decision, advance) {
      await saveCurrent({ decision_editorial: decision }, advance);
    }

    /**
     * saveCurrent — guarda frase_final + notas + cualquier campo en `extra`.
     * Si `extra` no incluye decision_editorial, el servidor NO la cambia.
     * Si `extra` incluye decision_editorial, el servidor la valida y actualiza.
     *
     * Nunca envía sirve, estado, clasificado_manual ni campos legacy.
     */
    async function saveCurrent(extra, advance) {
      const item = currentItem();
      if (!item || state.saving) return;

      state.saving = true;
      setStatus("Guardando...");
      renderGroupButtons();

      const finalPhrase = document.getElementById("finalPhrase")?.value ?? "";
      const notes       = document.getElementById("notes")?.value ?? "";

      // Payload limpio: solo campos del nuevo modelo
      // decision_editorial solo llega si `extra` lo incluye explícitamente
      const payload = {
        grupo_carrusel: state.selectedGroup,
        frase_final:    finalPhrase,
        notas:          notes,
        ...extra   // puede traer { decision_editorial } o { grupo_carrusel } solos
      };

      try {
        const res = await fetch(`/api/phrases/${item.rowNumber}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "No se pudo guardar");

        // Actualizar item en memoria con la respuesta del servidor
        const itemIndex = state.items.findIndex(row => row.rowNumber === item.rowNumber);
        if (itemIndex >= 0) state.items[itemIndex] = data.item;

        state.saving = false;

        if (advance) {
          // Guardar el rowNumber de la frase que acabamos de guardar
          const currentRowNumber = item.rowNumber;

          // Re-aplicar filtros sin preservar posición (el item ya fue actualizado)
          applyFilters(false);

          // Buscar si la frase guardada sigue visible en el filtro
          const sameIndex = state.filtered.findIndex(row => row.rowNumber === currentRowNumber);

          if (sameIndex >= 0 && sameIndex < state.filtered.length - 1) {
            // La frase sigue visible y no es la última — avanzar al siguiente
            state.index = sameIndex + 1;
            renderPhrase();
          } else if (sameIndex >= 0 && state.filtered.length > 1) {
            // Era la última visible — volver a la primera
            state.index = 0;
            renderPhrase();
          } else if (sameIndex < 0 && state.filtered.length > 0) {
            // La frase desapareció del filtro — mantener posición válida
            state.index = Math.min(state.index, state.filtered.length - 1);
            renderPhrase();
          } else {
            // No quedan frases (lista vacía o era la única)
            renderPhrase();
          }
        } else {
          applyFilters(true);
          setStatus("Guardado");
        }
      } catch (err) {
        state.saving = false;
        setStatus(err.message || String(err));
        renderGroupButtons();
      }
    }

    // ─── navegación ────────────────────────────────────────────────────────────

    function move(delta) {
      if (!state.filtered.length) return;
      state.index = Math.max(0, Math.min(state.filtered.length - 1, state.index + delta));
      renderPhrase();
    }

    // ─── filtro de grupo ───────────────────────────────────────────────────────

    function renderGroupFilter() {
      const current = els.groupFilter.value;
      els.groupFilter.innerHTML = '<option value="">Todos los grupos</option>';
      for (const group of state.taxonomy) {
        const option = document.createElement("option");
        option.value = group.name;
        option.textContent = group.name;
        els.groupFilter.appendChild(option);
      }
      els.groupFilter.value = current;
    }

    // ─── carga inicial ─────────────────────────────────────────────────────────

    async function load() {
      els.phrasePanel.innerHTML = '<div class="empty">Cargando frases...</div>';

      const res = await fetch("/api/phrases");
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "No se pudo cargar archivo_x");

      state.items     = data.items    || [];
      state.taxonomy  = data.taxonomy || [];
      state.worksheet = data.worksheet || "archivo_x";

      els.worksheetLabel.textContent = `Pestaña: ${state.worksheet}`;
      renderGroupFilter();
      renderStats(data.summary);
      applyFilters(false);
    }

    function showFatal(err) {
      els.phrasePanel.innerHTML = `<div class="empty">${escapeHtml(err.message || String(err))}</div>`;
    }

    // ─── event listeners ───────────────────────────────────────────────────────

    els.filterSelect.addEventListener("change", () => applyFilters(false));
    els.groupFilter.addEventListener("change",  () => applyFilters(false));
    els.searchInput.addEventListener("input",   () => applyFilters(false));
    els.reloadBtn.addEventListener("click",     () => load().catch(showFatal));

    load().catch(showFatal);
  </script>
</body>
</html>
