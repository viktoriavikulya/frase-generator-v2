<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar Post</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0f14;
      color: #f6f1e8;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 24px;
      color: #f4c400;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #aaa;
    }

    .field-hint {
      font-size: 12px;
      color: #555;
      margin-top: -12px;
      margin-bottom: 16px;
    }

    textarea, input[type="text"], input[type="password"] {
      width: 100%;
      background: #1a1c22;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f6f1e8;
      font-size: 15px;
      padding: 12px;
      margin-bottom: 16px;
      outline: none;
    }

    textarea:focus, input:focus {
      border-color: #f4c400;
    }

    #frases {
      height: 200px;
      resize: vertical;
    }

    #tipo-detectado {
      font-size: 12px;
      color: #f4c400;
      margin-top: -12px;
      margin-bottom: 16px;
      min-height: 18px;
    }

    .acciones {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #btn-publicar {
      width: 100%;
      background: #f4c400;
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
    }

    #btn-guardar {
      width: 100%;
      background: #1a1c22;
      color: #f6f1e8;
      border: 1px solid #3d5afe;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
    }

    #btn-publicar:disabled,
    #btn-guardar:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    .ok    { color: #4caf50; }
    .error { color: #e53935; }
  </style>
</head>
<body>

  <h1>🔥 Publicar Post</h1>

  <label>Token de GitHub</label>
  <input type="password" id="token" placeholder="ghp_..." autocomplete="current-password">

  <label>PIN</label>
  <input type="password" id="pin" placeholder="PIN de autorización" autocomplete="off">
  <p class="field-hint">El PIN se valida en GitHub Actions — nunca viaja al navegador de otra persona.</p>

  <label>Caption</label>
  <input type="text" id="caption" placeholder="Ej: y ya, sin drama.">

  <label>Frases (una por línea)</label>
  <textarea id="frases" placeholder="Frase 1&#10;Frase 2" oninput="detectarTipo()"></textarea>
  <p class="field-hint">1 frase → single · 2 a 10 frases → carrusel</p>
  <div id="tipo-detectado"></div>

  <div class="acciones">
    <button id="btn-publicar" onclick="publicar(false)">🔥 Publicar ahora</button>
    <button id="btn-guardar"  onclick="publicar(true)">📋 Guardar en sheet</button>
  </div>

  <div id="status"></div>

<script>
  const OWNER    = "imgifra";
  const REPO     = "frase-generator-v2";
  const WORKFLOW = "publish.yml";

  function detectarTipo() {
    const frases = parseFrases();
    const el = document.getElementById("tipo-detectado");

    if (frases.length === 0) {
      el.textContent = "";
    } else if (frases.length === 1) {
      el.textContent = "🖼️ Single detectado";
    } else if (frases.length <= 10) {
      el.textContent = `🎠 Carrusel detectado (${frases.length} frases)`;
    } else {
      el.textContent = `⚠️ Máximo 10 frases (tienes ${frases.length})`;
    }
  }

  function parseFrases() {
    return document.getElementById("frases").value
      .split("\n")
      .map(f => f.trim())
      .filter(Boolean);
  }

  async function publicar(soloSheet) {
    const token   = document.getElementById("token").value.trim();
    const pin     = document.getElementById("pin").value.trim();
    const caption = document.getElementById("caption").value.trim();
    const frases  = parseFrases();
    const status  = document.getElementById("status");
    const btnPublicar = document.getElementById("btn-publicar");
    const btnGuardar  = document.getElementById("btn-guardar");

    status.textContent = "";
    status.className   = "";

    if (!token)           { setStatus("Falta el token de GitHub.", "error"); return; }
    if (!pin)             { setStatus("Falta el PIN.", "error"); return; }
    if (!caption)         { setStatus("Falta el caption.", "error"); return; }
    if (frases.length < 1)  { setStatus("Escribe al menos una frase.", "error"); return; }
    if (frases.length > 10) { setStatus("Máximo 10 frases.", "error"); return; }

    const tipo = frases.length === 1 ? "single" : "carousel";

    btnPublicar.disabled = true;
    btnGuardar.disabled  = true;
    setStatus(soloSheet ? "Guardando en sheet..." : "Publicando...", "");

    try {
      const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
        {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ref: "main",
            inputs: {
              frases:          frases.join("||"),
              caption,
              tipo,
              solo_registrar:  soloSheet ? "true" : "false",
              pin                          // ← validado en GitHub Actions contra PUBLISHER_PIN
            }
          })
        }
      );

      if (res.status === 204) {
        const msg = soloSheet
          ? "📋 Guardado en sheet. Se publicará en el próximo horario programado."
          : `✅ Enviado como ${tipo}. En 2-3 minutos estará publicado.`;

        setStatus(msg, "ok");
        document.getElementById("frases").value  = "";
        document.getElementById("caption").value = "";
        document.getElementById("tipo-detectado").textContent = "";
      } else {
        const data = await res.json();
        setStatus(`❌ Error: ${data.message}`, "error");
      }
    } catch (err) {
      setStatus(`❌ Error: ${err.message}`, "error");
    } finally {
      btnPublicar.disabled = false;
      btnGuardar.disabled  = false;
    }
  }

  function setStatus(msg, cls) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className   = cls;
  }
</script>

</body>
</html>
