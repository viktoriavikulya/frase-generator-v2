<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar Post</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0f14;
      color: #f6f1e8;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 24px;
      color: #f4c400;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #aaa;
    }

    textarea, input[type="text"], input[type="password"] {
      width: 100%;
      background: #1a1c22;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f6f1e8;
      font-size: 15px;
      padding: 12px;
      margin-bottom: 16px;
      outline: none;
    }

    textarea:focus, input:focus {
      border-color: #f4c400;
    }

    #frases {
      height: 200px;
      resize: vertical;
    }

    #hint-frases {
      font-size: 12px;
      color: #666;
      margin-top: -12px;
      margin-bottom: 16px;
    }

    #tipo-detectado {
      font-size: 12px;
      color: #f4c400;
      margin-top: -12px;
      margin-bottom: 16px;
      min-height: 18px;
    }

    .acciones {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #btn-publicar {
      width: 100%;
      background: #f4c400;
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
    }

    #btn-guardar {
      width: 100%;
      background: #1a1c22;
      color: #f6f1e8;
      border: 1px solid #3d5afe;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
    }

    #btn-publicar:disabled,
    #btn-guardar:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    .ok { color: #4caf50; }
    .error { color: #e53935; }

    #pantalla-lock {
      position: fixed;
      inset: 0;
      background: #0d0f14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      z-index: 999;
    }

    #pantalla-lock h2 {
      font-size: 20px;
      color: #f4c400;
    }

    #pantalla-lock input {
      width: 100%;
      max-width: 300px;
      text-align: center;
      font-size: 18px;
      letter-spacing: 4px;
    }

    #btn-entrar {
      width: 100%;
      max-width: 300px;
      background: #f4c400;
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
    }

    #lock-error {
      font-size: 13px;
      color: #e53935;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <div id="pantalla-lock">
    <h2>🔒 Acceso</h2>
    <input type="password" id="clave-input" placeholder="Clave" onkeydown="if(event.key==='Enter') entrar()">
    <button id="btn-entrar" onclick="entrar()">Entrar</button>
    <div id="lock-error"></div>
  </div>

  <h1>🔥 Publicar Post</h1>

  <label>Caption</label>
  <input type="text" id="caption" placeholder="Ej: y ya, sin drama.">

  <label>Frases (una por línea)</label>
  <textarea id="frases" placeholder="Frase 1&#10;Frase 2" oninput="detectarTipo()"></textarea>
  <div id="hint-frases">1 frase → single · 2 a 10 frases → carrusel</div>
  <div id="tipo-detectado"></div>

  <div class="acciones">
    <button id="btn-publicar" onclick="publicar(false)">🔥 Publicar ahora</button>
    <button id="btn-guardar" onclick="publicar(true)">📋 Guardar en sheet</button>
  </div>

  <div id="status"></div>

<script>
  const OWNER = "imgifra";
  const REPO = "frase-generator-v2";
  const WORKFLOW = "publish.yml";
  const CLAVE = "Mona";
  const GH_TOKEN = "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";

  function entrar() {
    const input = document.getElementById("clave-input").value;
    if (input === CLAVE) {
      document.getElementById("pantalla-lock").style.display = "none";
    } else {
      document.getElementById("lock-error").textContent = "Clave incorrecta.";
      document.getElementById("clave-input").value = "";
    }
  }

  function detectarTipo() {
    const frasesRaw = document.getElementById("frases").value;
    const frases = frasesRaw.split("\n").map(f => f.trim()).filter(Boolean);
    const el = document.getElementById("tipo-detectado");

    if (frases.length === 0) {
      el.textContent = "";
    } else if (frases.length === 1) {
      el.textContent = "🖼️ Single detectado";
    } else if (frases.length <= 10) {
      el.textContent = `🎠 Carrusel detectado (${frases.length} frases)`;
    } else {
      el.textContent = `⚠️ Máximo 10 frases (tienes ${frases.length})`;
    }
  }

  async function publicar(soloSheet) {
    const caption = document.getElementById("caption").value.trim();
    const frasesRaw = document.getElementById("frases").value;
    const frases = frasesRaw.split("\n").map(f => f.trim()).filter(Boolean);
    const status = document.getElementById("status");
    const btnPublicar = document.getElementById("btn-publicar");
    const btnGuardar = document.getElementById("btn-guardar");

    status.textContent = "";
    status.className = "";

    if (!caption) { status.textContent = "Falta el caption."; status.className = "error"; return; }
    if (frases.length < 1) { status.textContent = "Escribe al menos una frase."; status.className = "error"; return; }
    if (frases.length > 10) { status.textContent = "Máximo 10 frases."; status.className = "error"; return; }

    const tipo = frases.length === 1 ? "single" : "carousel";

    btnPublicar.disabled = true;
    btnGuardar.disabled = true;
    status.textContent = soloSheet ? "Guardando en sheet..." : "Publicando...";

    try {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/dispatches`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${GH_TOKEN}`,
          "Accept": "application/vnd.github+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          ref: "main",
          inputs: {
            frases: frases.join("||"),
            caption,
            tipo,
            solo_registrar: soloSheet ? "true" : "false"
          }
        })
      });

      if (res.status === 204) {
        if (soloSheet) {
          status.textContent = "📋 Guardado en sheet. Se publicará en el próximo horario programado.";
        } else {
          status.textContent = `✅ Enviado como ${tipo}. En 2-3 minutos estará publicado.`;
        }
        status.className = "ok";
        document.getElementById("frases").value = "";
        document.getElementById("caption").value = "";
        document.getElementById("tipo-detectado").textContent = "";
      } else {
        const data = await res.json();
        status.textContent = `❌ Error: ${data.message}`;
        status.className = "error";
      }
    } catch (err) {
      status.textContent = `❌ Error: ${err.message}`;
      status.className = "error";
    } finally {
      btnPublicar.disabled = false;
      btnGuardar.disabled = false;
    }
  }
</script>

</body>
</html>
