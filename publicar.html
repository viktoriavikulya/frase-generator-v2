<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar Carrusel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0f14;
      color: #f6f1e8;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 24px;
      color: #f4c400;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #aaa;
    }

    textarea, input {
      width: 100%;
      background: #1a1c22;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f6f1e8;
      font-size: 15px;
      padding: 12px;
      margin-bottom: 16px;
      outline: none;
    }

    textarea:focus, input:focus {
      border-color: #f4c400;
    }

    #frases {
      height: 200px;
      resize: vertical;
    }

    button {
      width: 100%;
      background: #f4c400;
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    .ok { color: #4caf50; }
    .error { color: #e53935; }
  </style>
</head>
<body>

  <h1>🔥 Publicar Carrusel</h1>

  <label>Token</label>
  <input type="password" id="token" placeholder="Tu token secreto">

  <label>Caption</label>
  <input type="text" id="caption" placeholder="Ej: y ya, sin drama.">

  <label>Frases (una por línea, mínimo 3)</label>
  <textarea id="frases" placeholder="Frase 1&#10;Frase 2"></textarea>

  <button id="btn" onclick="publicar()">Publicar</button>

  <div id="status"></div>

<script>
  const OWNER = "imgifra";
  const REPO = "frase-generator-v2";
  const WORKFLOW = "publish.yml";

  async function publicar() {
    const token = document.getElementById("token").value.trim();
    const caption = document.getElementById("caption").value.trim();
    const frasesRaw = document.getElementById("frases").value;
    const frases = frasesRaw.split("\n").map(f => f.trim()).filter(Boolean);
    const status = document.getElementById("status");
    const btn = document.getElementById("btn");

    status.textContent = "";
    status.className = "";

    if (!token) { status.textContent = "Falta el token."; status.className = "error"; return; }
    if (!caption) { status.textContent = "Falta el caption."; status.className = "error"; return; }
    if (frases.length < 2) { status.textContent = "Mínimo 3 frases."; status.className = "error"; return; }
    if (frases.length > 10) { status.textContent = "Máximo 10 frases."; status.className = "error"; return; }

    btn.disabled = true;
    status.textContent = "Publicando...";

    try {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/dispatches`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`,
          "Accept": "application/vnd.github+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          ref: "main",
          inputs: { frases: frases.join("||"), caption }
        })
      });

      if (res.status === 204) {
        status.textContent = "✅ Enviado. En 2-3 minutos estará publicado.";
        status.className = "ok";
        document.getElementById("frases").value = "";
        document.getElementById("caption").value = "";
      } else {
        const data = await res.json();
        status.textContent = `❌ Error: ${data.message}`;
        status.className = "error";
      }
    } catch (err) {
      status.textContent = `❌ Error: ${err.message}`;
      status.className = "error";
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
