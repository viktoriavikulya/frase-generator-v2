name: Publish Posts

on:
  schedule:
    - cron: '0 15 * * *'   # 10am Bogotá (UTC-5)
    - cron: '0 23 * * *'   # 6pm Bogotá (UTC-5)

  workflow_dispatch:
    inputs:
      frases:
        description: 'Frases separadas por ||'
        required: false
        default: ''
      caption:
        description: 'Caption del post'
        required: false
        default: ''
      tipo:
        description: 'Tipo de post: carousel | single'
        required: false
        default: 'carousel'
      solo_registrar:
        description: 'Solo guardar en sheet sin publicar: true | false'
        required: false
        default: 'false'
      reintentar:
        description: 'Reintentar posts en error: true | false'
        required: false
        default: 'false'
      color:
        description: 'Color de fondo hex (vacío = aleatorio)'
        required: false
        default: ''
      publish_only:
        description: 'Republicar sin re-renderizar. Pasar row_id (single) o carousel_id (carousel)'
        required: false
        default: ''
      unlock_id:
        description: 'Desbloquear fila atascada. Pasar row_id (single) o carousel_id (carousel)'
        required: false
        default: ''

concurrency:
  group: publish-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    env:
      SHEET_ID: ${{ secrets.SHEET_ID }}
      WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}

      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      GRAPH_API_VERSION: ${{ secrets.GRAPH_API_VERSION }}

      GENERATOR_URL: ${{ secrets.GENERATOR_URL }}
      GENERATOR_PORT: ${{ secrets.GENERATOR_PORT }}

      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}

      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create service account file
        run: |
          mkdir -p config
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > config/service_account.json

      - name: Install dependencies
        timeout-minutes: 5
        run: npm ci

      - name: Desbloquear fila manualmente
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.unlock_id != '' }}
        env:
          UNLOCK_ID: ${{ inputs.unlock_id }}
        run: node scripts/pipeline/unlock-row.js

      - name: Registrar frases si vienen del formulario
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.frases != '' && inputs.unlock_id == '' }}
        env:
          FRASES_INPUT: ${{ inputs.frases }}
          CAPTION_INPUT: ${{ inputs.caption }}
          TIPO_INPUT: ${{ inputs.tipo }}
          COLOR_INPUT: ${{ inputs.color }}
        run: node scripts/pipeline/register-from-form.js

      - name: Install Playwright browsers
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.unlock_id == '' && inputs.publish_only == '' && inputs.solo_registrar != 'true') }}
        run: npx playwright install --with-deps chromium

      - name: Run pipeline formulario
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.frases != '' && inputs.solo_registrar != 'true' && inputs.unlock_id == '' }}
        env:
          FORM_MODE: "true"
          TARGET_CAROUSEL_ID: ${{ env.TARGET_CAROUSEL_ID }}
          TARGET_ROW_NUMBER: ${{ env.TARGET_ROW_NUMBER }}
          TIPO_INPUT: ${{ inputs.tipo }}
        run: node scripts/pipeline/run-once.js

      - name: Run publish-only
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_only != '' && inputs.frases == '' && inputs.unlock_id == '' }}
        env:
          PUBLISH_ONLY: "true"
          PUBLISH_ONLY_ID: ${{ inputs.publish_only }}
          TIPO_INPUT: ${{ inputs.tipo }}
        run: node scripts/pipeline/run-once.js

      - name: Run pipeline reintentar
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reintentar == 'true' && inputs.frases == '' && inputs.publish_only == '' && inputs.unlock_id == '' }}
        env:
          TIPO_INPUT: ${{ inputs.tipo }}
        run: node scripts/pipeline/run-once.js

      - name: Run pipeline programado
        if: ${{ github.event_name == 'schedule' }}
        run: node scripts/pipeline/run-once.js
