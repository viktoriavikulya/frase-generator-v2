name: Publish Posts

on:
  schedule:
    - cron: '0 15 * * *'   # 10am Bogota (UTC-5)
    - cron: '0 23 * * *'   # 6pm Bogota (UTC-5)

  repository_dispatch:
    types: [publish-posts]

concurrency:
  group: publish-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      SHEET_ID: ${{ secrets.SHEET_ID }}
      WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}

      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
      GRAPH_API_VERSION: ${{ secrets.GRAPH_API_VERSION }}

      GENERATOR_URL: ${{ secrets.GENERATOR_URL }}
      GENERATOR_PORT: ${{ secrets.GENERATOR_PORT }}

      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}

      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      DISPATCH_FRASES: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.frases || '' }}
      DISPATCH_CAPTION: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.caption || '' }}
      DISPATCH_TIPO: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tipo || 'auto' }}
      DISPATCH_SOLO_REGISTRAR: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.solo_registrar || 'false' }}
      DISPATCH_REINTENTAR: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.reintentar || 'false' }}
      DISPATCH_COLOR: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.color || '' }}
      DISPATCH_PUBLISH_ONLY: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.publish_only || '' }}
      DISPATCH_UNLOCK_ID: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.unlock_id || '' }}
      DISPATCH_TARGET_CAROUSEL_ID: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.target_carousel_id || '' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create service account file
        run: |
          mkdir -p config
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > config/service_account.json

      - name: Install dependencies
        timeout-minutes: 5
        run: npm ci

      - name: Cache Playwright browsers
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'repository_dispatch' && env.DISPATCH_UNLOCK_ID == '' && env.DISPATCH_PUBLISH_ONLY == '' && env.DISPATCH_SOLO_REGISTRAR != 'true') }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'repository_dispatch' && env.DISPATCH_UNLOCK_ID == '' && env.DISPATCH_PUBLISH_ONLY == '' && env.DISPATCH_SOLO_REGISTRAR != 'true') }}
        run: npx playwright install chromium --with-deps

      - name: Desbloquear fila manualmente
        if: ${{ github.event_name == 'repository_dispatch' && env.DISPATCH_UNLOCK_ID != '' }}
        env:
          UNLOCK_ID: ${{ env.DISPATCH_UNLOCK_ID }}
        run: node scripts/pipeline/unlock-row.js

      - name: Registrar frases si vienen del formulario
        if: ${{ github.event_name == 'repository_dispatch' && env.DISPATCH_FRASES != '' && env.DISPATCH_UNLOCK_ID == '' }}
        env:
          FRASES_INPUT: ${{ env.DISPATCH_FRASES }}
          CAPTION_INPUT: ${{ env.DISPATCH_CAPTION }}
          TIPO_INPUT: ${{ env.DISPATCH_TIPO }}
          COLOR_INPUT: ${{ env.DISPATCH_COLOR }}
        run: node scripts/pipeline/register-from-form.js

      - name: Run pipeline formulario
        if: ${{ github.event_name == 'repository_dispatch' && env.DISPATCH_FRASES != '' && env.DISPATCH_SOLO_REGISTRAR != 'true' && env.DISPATCH_UNLOCK_ID == '' }}
        env:
          FORM_MODE: "true"
          TIPO_INPUT: ${{ env.DISPATCH_TIPO }}
        run: node scripts/pipeline/run-once.js

      - name: Run publish-only
        if: ${{ github.event_name == 'repository_dispatch' && env.DISPATCH_PUBLISH_ONLY != '' && env.DISPATCH_FRASES == '' && env.DISPATCH_UNLOCK_ID == '' }}
        env:
          PUBLISH_ONLY: "true"
          PUBLISH_ONLY_ID: ${{ env.DISPATCH_PUBLISH_ONLY }}
          TIPO_INPUT: ${{ env.DISPATCH_TIPO }}
        run: node scripts/pipeline/run-once.js

      - name: Run pipeline reintentar
        if: ${{ github.event_name == 'repository_dispatch' && env.DISPATCH_REINTENTAR == 'true' && env.DISPATCH_FRASES == '' && env.DISPATCH_PUBLISH_ONLY == '' && env.DISPATCH_UNLOCK_ID == '' }}
        env:
          TIPO_INPUT: ${{ env.DISPATCH_TIPO }}
        run: node scripts/pipeline/run-once.js

      - name: Run pipeline carrusel especifico
        if: ${{ github.event_name == 'repository_dispatch' && env.DISPATCH_TARGET_CAROUSEL_ID != '' && env.DISPATCH_FRASES == '' && env.DISPATCH_PUBLISH_ONLY == '' && env.DISPATCH_REINTENTAR != 'true' && env.DISPATCH_UNLOCK_ID == '' }}
        env:
          TIPO_INPUT: carousel
          TARGET_CAROUSEL_ID: ${{ env.DISPATCH_TARGET_CAROUSEL_ID }}
        run: node scripts/pipeline/run-once.js

      - name: Run pipeline programado
        if: ${{ github.event_name == 'schedule' }}
        run: node scripts/pipeline/run-once.js
