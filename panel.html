<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel monacastrosa</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080808;
      --panel: #101010;
      --panel-2: #151515;
      --text: #d9d3c9;
      --title: #e8e2d9;
      --muted: #777;
      --quiet: #444;
      --border: #242424;
      --border-strong: #555;
      --accent: #e8e2d9;
      --accent-fg: #080808;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .top {
      border-bottom: 1px solid var(--border);
      background: rgba(8, 8, 8, 0.96);
      padding: 18px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1180px;
      margin: 0 auto 16px;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin: 0 0 5px;
    }

    h1 {
      color: var(--title);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 26px;
      font-weight: 400;
      margin: 0;
    }

    .links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .link {
      color: var(--muted);
      border: 1px solid var(--border);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 9px 11px;
    }

    .link:hover {
      color: var(--text);
      border-color: var(--border-strong);
    }

    .tabs {
      display: flex;
      gap: 8px;
      max-width: 1180px;
      margin: 0 auto;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tab {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      padding: 11px 14px;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-fg);
    }

    .frame-wrap {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .bar {
      display: none;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      padding: 12px 20px;
    }

    .bar.active {
      display: flex;
    }

    .bar-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    .bar label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .bar input {
      width: 100%;
      min-width: 180px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 11px;
      outline: none;
    }

    .bar input:focus {
      border-color: var(--border-strong);
    }

    .bar button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 10px 12px;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .bar button:hover {
      border-color: var(--border-strong);
    }

    .frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .empty {
      display: none;
      place-items: center;
      min-height: 55vh;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .empty.active {
      display: grid;
    }

    .empty-card {
      max-width: 520px;
      border: 1px solid var(--border);
      padding: 24px;
      background: var(--panel);
    }

    .empty-card p {
      margin: 0 0 16px;
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      .top-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .links {
        justify-content: flex-start;
      }

      .bar-inner {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="top-row">
        <div class="brand">
          <p class="eyebrow">monacastrosa</p>
          <h1>Panel</h1>
        </div>
        <nav class="links" aria-label="Enlaces directos">
          <a class="link" href="publicar.html" target="_blank" rel="noopener">Publicar</a>
          <a class="link" href="index.html" target="_blank" rel="noopener">Render real</a>
          <a class="link" id="curator-link" href="https://archivo-x-curator.onrender.com/" target="_blank" rel="noopener">Archivo X</a>
        </nav>
      </div>

      <div class="tabs" role="tablist" aria-label="Secciones del panel">
        <button class="tab active" type="button" data-tab="publish">Publicar</button>
        <button class="tab" type="button" data-tab="render">Render real</button>
        <button class="tab" type="button" data-tab="archive">Archivo X</button>
      </div>
    </header>

    <main class="frame-wrap">
      <div class="bar" id="archive-bar">
        <div class="bar-inner">
          <label for="curator-url">URL Render</label>
          <input id="curator-url" type="url" spellcheck="false" value="https://archivo-x-curator.onrender.com/">
          <button type="button" id="save-curator-url">Guardar</button>
          <button type="button" id="reload-frame">Recargar</button>
        </div>
      </div>

      <iframe class="frame" id="main-frame" title="Panel" src="publicar.html"></iframe>

      <div class="empty" id="frame-empty">
        <div class="empty-card">
          <p>No se pudo cargar la vista dentro del panel.</p>
          <a class="link" id="open-current" href="publicar.html" target="_blank" rel="noopener">Abrir en pestana nueva</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    const DEFAULT_CURATOR_URL = "https://archivo-x-curator.onrender.com/";
    const STORAGE_KEY = "monacastrosa-curator-url";

    const frame = document.getElementById("main-frame");
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const archiveBar = document.getElementById("archive-bar");
    const curatorUrlInput = document.getElementById("curator-url");
    const curatorLink = document.getElementById("curator-link");
    const openCurrent = document.getElementById("open-current");

    const routes = {
      publish: () => "publicar.html",
      render: () => "index.html",
      archive: () => getCuratorUrl()
    };

    function normalizeUrl(value) {
      const trimmed = String(value || "").trim();
      if (!trimmed) return DEFAULT_CURATOR_URL;
      return /^https?:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;
    }

    function getCuratorUrl() {
      return normalizeUrl(localStorage.getItem(STORAGE_KEY) || curatorUrlInput.value || DEFAULT_CURATOR_URL);
    }

    function setCuratorUrl(value) {
      const url = normalizeUrl(value);
      localStorage.setItem(STORAGE_KEY, url);
      curatorUrlInput.value = url;
      curatorLink.href = url;
      return url;
    }

    function setActiveTab(name) {
      const getRoute = routes[name] || routes.publish;
      const nextSrc = getRoute();

      tabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.tab === name);
      });

      archiveBar.classList.toggle("active", name === "archive");
      frame.src = nextSrc;
      openCurrent.href = nextSrc;
      location.hash = name;
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setActiveTab(tab.dataset.tab));
    });

    document.getElementById("save-curator-url").addEventListener("click", () => {
      const url = setCuratorUrl(curatorUrlInput.value);
      frame.src = url;
      openCurrent.href = url;
    });

    document.getElementById("reload-frame").addEventListener("click", () => {
      frame.src = frame.src;
    });

    setCuratorUrl(localStorage.getItem(STORAGE_KEY) || DEFAULT_CURATOR_URL);

    const initialTab = location.hash.replace("#", "");
    setActiveTab(routes[initialTab] ? initialTab : "publish");
  </script>
</body>
</html>
