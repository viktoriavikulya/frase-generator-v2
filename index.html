<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mono Generator 🐵</title>

  <!-- Felt Tip Roman (modo normal) -->
  <link href="https://fonts.cdnfonts.com/css/felt-tip-roman" rel="stylesheet">

  <!-- Noto Serif para modo Retro 3D -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&display=swap" rel="stylesheet">

  <!-- Preload de la fuente oficial Brat (Arial Narrow real) -->
  <link rel="preload" 
        href="https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff"
        as="font" 
        type="font/woff" 
        crossorigin>

  <!-- Fuente oficial Brat: Arial Narrow REAL -->
  <style>
    @font-face {
      font-family: 'arial_narrowregular';
      src: url('https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
  </style>

  <style>
  @font-face {
    font-family: 'OPTICashew-ExtraBold';
    src: url('assets/OPTICashew-ExtraBold.woff') format('woff');
    font-weight: 800;
  }
  </style>



  <!-- Tailwind para layout de controles -->
  <script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --controls-h: 110px;
  }

  html, body {
  height: 100dvh;
  overflow: hidden;
  }


  body {
    background: #111;
    margin: 0;
    color: #fff;
    font-family: 'Felt Tip Roman', cursive;
    overflow: hidden;
  }

  /* Área de preview */
  #stage {
    height: calc(100vh - var(--controls-h));
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #previewCanvas {
    width: min(90vw, 90vh);
    height: min(90vw, 90vh);
    box-shadow: 0 8px  3px rgba(0,0,0,0.35);
    border-radius: 25px;
    background: #fff;
    display: block;
  }

  /* Panel de control inferior */
  .control-panel {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: var(--controls-h);
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    z-index: 20;
    padding-bottom: 90px;
  }

  .control-panel {
    padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
  }

  #multiBtn {
    margin-bottom: calc(env(safe-area-inset-bottom) + 90px);
  }



  /* Switch tipo iPhone */
  .switch {
    position: relative;
    width: 55px;
    height: 28px;
  }
  .switch input { display:none; }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #555;
    transition: .3s;
    border-radius: 34px;
  }
  .slider:before {
    content: "";
    position: absolute;
    height: 22px;
    width: 22px;
    left: 3px;
    bottom: 3px;
    background: #fff;
    transition: .3s;
    border-radius: 50%;
  }
  input:checked + .slider {
    background-color: #22c55e;
  }
  input:checked + .slider:before {
    transform: translateX(26px);
  }

  /* Input de color */
  #bgColor {
    width: 34px;
    height: 34px;
    padding: 0;
    border-radius: 999px;
    border: none;
    overflow: hidden;
  }
  #bgColor::-webkit-color-swatch,
  #bgColor::-moz-color-swatch {
    border: none;
    border-radius: 999px;
  }

  /* =========================================
            RESPONSIVE PARA CELULARES
     ========================================= */
  @media (max-width: 480px) {

    /* Aumentamos la altura para que todo quepa */
    :root {
      --controls-h: 160px;
    }

    /* Panel en vertical */
    .control-panel {
      height: var(--controls-h);
      flex-direction: column;
      gap: 10px;
      padding: 10px 8px;
    }

    /* Segunda fila: input + color + botón → vertical */
    .control-panel > div:nth-child(2) {
      display: flex;
      flex-direction: column;
      gap: 8px !important;
      width: 100%;
      padding: 0 10px;
    }

    /* Input ocupa todo el ancho */
    #textInput {
      width: 100% !important;
      font-size: 16px !important;
      padding: 8px !important;
    }

    /* Botón ocupa todo el ancho */
    #downloadBtn {
      width: 100%;
      padding: 8px !important;
      font-size: 14px !important;
    }

    /* Color picker más pequeño */
    #bgColor {
      width: 28px !important;
      height: 28px !important;
    }

  }
</style>

</head>
<body>

  <main id="stage">
    <canvas id="previewCanvas" width="1080" height="1350"></canvas>
  </main>

  <!-- Controles -->
  <div class="control-panel">
    <!-- Modo -->
    <div class="flex items-center justify-center gap-3 text-sm">
      <span>Modo:</span>
      <select id="modeSelect" class="text-black rounded-lg px-3 py-1 font-bold">
        <option value="normal">Normal</option>
        <option value="brat">Brat</option>
        <option value="retro3d">3D Retro</option>
      </select>
    </div>

    <!-- Texto + fondo + botón -->
    <div class="flex items-center justify-center gap-3 w-full px-3">
      <input
        id="textInput"
        type="text"
        placeholder="Escribe tu frase..."
        class="flex-1 p-2 rounded-lg text-black text-center font-bold text-lg outline-none"
      >

      <div class="flex items-center gap-1 text-sm">
        <span>Fondo:</span>
        <input type="color" id="bgColor" value="#ffffff">
      </div>

      <button
        id="downloadBtn"
        class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 active:bg-indigo-800"
      >
        Descargar PNG
      </button>
    </div>
  </div>

  <script>

    /* ========= SETUP / INIT ========= */

    const canvas = document.getElementById("previewCanvas");
    const ctx = canvas.getContext("2d");

    const assetsReady = {
      watermark: false,
      retroLogo: false
    };

    // Marca de agua como imagen
    const watermarkImage = new Image();
    watermarkImage.src = "assets/marca2.png?v=1";
    watermarkImage.onload = () => {
      assetsReady.watermark = true;
      draw();
    };

    const retroLogoImage = new Image();
    retroLogoImage.src = "assets/marca3.png?v=1";
    retroLogoImage.onload = () => {
      assetsReady.retroLogo = true;
      draw();
    };


    const input = document.getElementById("textInput");
    const bgColorInput = document.getElementById("bgColor");
    const modeSelect = document.getElementById("modeSelect");
    const downloadBtn = document.getElementById("downloadBtn");

    const CANVAS_WIDTH = 1080;
    const CANVAS_HEIGHT = 1350;
    const PADDING = window.innerWidth < 600 ? 14 : 20;
    const BRAT_STRETCH_Y = 1.3;
    window.renderReady = false;

    const RETRO_3D_TEXT_CONFIG = {
      // Porcentaje del ancho total del canvas que ocupará la caja del texto.
      // Más alto = texto más ancho. Más bajo = texto más compacto.
      boxWidthRatio: 0.76,

      // Porcentaje del alto total del canvas disponible para el bloque de texto.
      // Más alto = permite más líneas o letras más grandes verticalmente.
      boxHeightRatio: 0.62,

      // Posición vertical del centro del bloque de texto.
      // 0.50 = centro exacto del canvas.
      // Menor a 0.50 sube el texto, mayor a 0.50 lo baja.
      centerYRatio: 0.50,

      // Tamaño máximo permitido para una línea.
      // Afecta especialmente líneas cortas o palabras sueltas.
      maxFont: 150,

      // Tamaño mínimo permitido para una línea.
      // Afecta frases largas. Si una frase no cabe, puede bajar hasta este tamaño.
      minFont: 58,

      // Separación vertical entre líneas.
      // 1.00 = separación igual al tamaño de fuente.
      // 0.82 = líneas más juntas, estilo póster.
      // Más alto = más aire entre líneas.
      lineHeightFactor: 0.88,

      // Qué tanto debe llenar cada línea el ancho de la caja.

      // Controla qué tanto intenta llenar cada línea al calcular tamaño.
      // Más bajo = líneas menos forzadas.
      layoutTargetFill: 1,

      // Controla hasta dónde se estira visualmente la línea al justificar.
      // Solo se nota si justify está en true.
      drawTargetFill: 1,

      // Activa o desactiva la justificación entre palabras.
      // true = reparte espacios para que la línea se vea justificada.
      // false = usa espacios normales.
      justify: true,

      // Espacio mínimo permitido entre palabras al justificar.
      // 0.70 = permite reducir el espacio hasta el 70% del espacio normal.
      minSpaceFactor: 0.70,

      // Espacio máximo permitido entre palabras al justificar.
      // 2.60 = permite ampliar el espacio hasta 2.6 veces el espacio normal.
      // Más alto = más justificación, pero puede crear huecos feos.
      maxSpaceFactor: 3.20,

      // Penalización para evitar líneas de una sola palabra en frases medianas/largas.
      // Más alto = evita más agresivamente palabras solas.
      singleWordPenalty: 180,

      // Penalización para evitar líneas con demasiadas palabras.
      // Más alto = favorece líneas cortas tipo póster.
      manyWordsPenalty: 90,

      // Penalización para evitar que la última línea quede muy corta.
      // Más alto = intenta balancear mejor el cierre de la frase.
      lastLineShortPenalty: 700,

      // Penalización cuando una línea no llena el ancho objetivo.
      // Más alto = fuerza líneas más llenas.
      fillPenalty: 260,

      // Penalización cuando la justificación requiere espacios demasiado grandes.
      // Más alto = evita huecos exagerados entre palabras.
      spacePenalty: 80,

      // Penalización cuando una línea queda cerca del tamaño mínimo.
      // Más alto = intenta evitar fuentes demasiado pequeñas.
      minFontPenalty: 20,

      // Máxima diferencia aceptable entre tamaños de líneas vecinas.
      // 1.65 significa que una línea puede ser hasta 1.65 veces más grande que la otra
      // antes de recibir penalización.
      maxJumpRatio: 1.65,

      // Variación mínima para premiar el efecto póster.
      // Si la línea más grande supera 1.15 veces a la más pequeña, puede recibir bono.
      variationBonusMin: 1.15,

      // Variación máxima para premiar el efecto póster.
      // Si pasa de 1.65, ya no se premia porque el salto se ve exagerado.
      variationBonusMax: 1.65,

      // Bono por tener variación agradable de tamaños.
      // Es negativo porque el algoritmo busca el puntaje más bajo.
      variationBonus: -35
    };


    // Eventos
    function applyUrlParams() {
      const params = new URLSearchParams(window.location.search);

      const text = params.get("text");
      const mode = params.get("mode");
      const bg = params.get("bg");

      if (text !== null) {
        input.value = text;
      }

      if (mode !== null && ["normal", "brat", "retro3d"].includes(mode)) {
        modeSelect.value = mode;
      }

      if (bg !== null) {
        bgColorInput.value = bg;
      }
    }

    // Eventos
    // Aplicar parámetros de URL inmediatamente.
    // Como este script está al final del body, los inputs ya existen.
    applyUrlParams();
    draw();

    document.fonts.ready.then(() => {
      draw();
      window.renderReady = true;
    });

    input.addEventListener("input", draw);
    bgColorInput.addEventListener("input", draw);
    modeSelect.addEventListener("change", draw);
    downloadBtn.addEventListener("click", downloadPNG);

    // Botón para múltiples frases
    const multiBtn = document.createElement("button");
    multiBtn.innerText = "Generar múltiples";
    multiBtn.className =
      "px-4 py-2 bg-pink-600 text-white text-sm rounded-lg shadow-md hover:bg-pink-700 active:bg-pink-800";
    multiBtn.onclick = generateMultiple;
    document.querySelector(".control-panel").appendChild(multiBtn);



/* ========= APP FLOW ========= */

    function draw() {
      const text = input.value.trim();
      const bg = bgColorInput.value;
      const mode = modeSelect.value;

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      if (mode !== "retro3d") {
        drawWatermark();
        drawAEStyleText();
      }

      if (!text) {
        drawPlaceholder();
      } else {
        if (mode === "normal") {
          drawNormal(text, bg);
        } else if (mode === "brat") {
          drawBrat(text, bg);
        } else if (mode === "retro3d") {
          drawRetro3D(text, bg);
        }
      }

      if (mode === "brat") {
        drawCornerTagBrat();
      } else if (mode === "retro3d") {
        drawRetroCornerLogo();
        drawCornerTagRetro3D();
      } else {
        drawCornerTagNormal();
      }
    }

    function drawPlaceholder() {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.font = "42px 'Felt Tip Roman', cursive";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(
        "v 97 🐵",
        CANVAS_WIDTH / 2,
        CANVAS_HEIGHT / 2
      );
      ctx.restore();
    }

    function downloadPNG() {
      const link = document.createElement("a");
      const mode = modeSelect.value;
      link.download = "nachozorra_" + mode + "_" + Date.now() + ".png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function generateMultiple() {
      const raw = input.value;
      const phrases = raw.split("@").map(t => t.trim()).filter(t => t.length > 0);

      if (phrases.length <= 1) {
        alert("Escribe varias frases separadas por @");
        return;
      }

      const originalText = raw;
      const originalBg = bgColorInput.value;
      const mode = modeSelect.value;

      const retroCycle = [
        "#f6f1e8", // retroWhite
        "#0d0f14", // retroBlack
        "#f4c400", // retroYellow
        "#3d5afe", // retroBlue
        "#e53935"  // retroRed
      ];

      let index = 0;

      function next() {
        if (index >= phrases.length) {
          input.value = originalText;
          bgColorInput.value = originalBg;
          draw();
          alert("Listo: todas las imágenes fueron generadas.");
          return;
        }

        const phrase = phrases[index];
        input.value = phrase;

        // Solo en retro3d: intercalar colores automáticamente
        if (mode === "retro3d") {
          bgColorInput.value = retroCycle[index % retroCycle.length];
        }

        draw();

        setTimeout(() => {
          const link = document.createElement("a");
          const safeMode = modeSelect.value;
          const colorSuffix = mode === "retro3d" ? `_c${(index % retroCycle.length) + 1}` : "";
          link.download = `frase_${index + 1}_${safeMode}${colorSuffix}.png`;
          link.href = canvas.toDataURL("image/png");
          link.click();

          index++;
          next();
        }, 250);
      }

      next();
    }







/* ========= MODE: NORMAL ========= */
    function drawNormal(text, bg) {
      ctx.save();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = getContrastColor(bg);

      // === Caja igual al estilo BRAT ===
      const boxWidth  = CANVAS_WIDTH  * 0.85;   // más angosto → más vertical
      const boxHeight = CANVAS_HEIGHT  * 0.90;   // ocupa casi todo el alto

      const boxX = (CANVAS_WIDTH  - boxWidth) / 2;
      const boxY = (CANVAS_HEIGHT  - boxHeight) / 2;

      // === Tamaños de letra más grandes ===
      const maxFont = 130;
      const minFont = 40;

      let fontSize = maxFont;
      let lines = [];

      // === Ajuste automático de tamaño ===
      while (fontSize > minFont) {
        ctx.font = `${fontSize}px 'Felt Tip Roman', cursive`;
        lines = wrapText(text, boxWidth, ctx);

        const totalHeight = lines.length * fontSize * 1.1;

        if (totalHeight <= boxHeight) break;  // cabe perfecto dentro del “box”

        fontSize -= 4;
      }

      // === Aplicar fuente final ===
      ctx.font = `${fontSize}px 'Felt Tip Roman', cursive`;
      lines = wrapText(text, boxWidth, ctx);

      // === Cálculo consistente del interlineado ===
      const lineHeight = fontSize * 1;     // ← mismo valor que en el dibujo
      const totalHeight = lines.length * lineHeight;

      // === Centrado vertical real ===
      let y = boxY + (boxHeight - totalHeight) / 2 + lineHeight / 2;

      // === Activar sombra suave (antes de dibujar las líneas) ===
      ctx.shadowColor = "rgba(0,0,0,0.20)";
      ctx.shadowBlur = 5;
      ctx.shadowOffsetX = 4;
      ctx.shadowOffsetY = 4;


      // === Dibujar texto línea por línea ===
      for (const line of lines) {
        ctx.strokeStyle = ctx.fillStyle;
        ctx.lineWidth = 2.35;
        ctx.strokeText(line, CANVAS_WIDTH  / 2, y);
        ctx.fillText(line, CANVAS_WIDTH  / 2, y);

        y += lineHeight;
      }


      ctx.restore();
    }

    function wrapText(text, maxWidth, ctxLocal) {
      const words = text.split(/\s+/).filter(Boolean);
      const lines = [];
      let current = "";

      // 1) Wrap codicioso normal
      for (const w of words) {
        const test = current ? current + " " + w : w;
        const width = ctxLocal.measureText(test).width;

        if (width > maxWidth && current) {
          lines.push(current);
          current = w;
        } else {
          current = test;
        }
      }

      if (current) lines.push(current);

      // 2) Evitar última línea de una sola palabra
      if (lines.length >= 2) {
        const last = lines[lines.length - 1];
        const prev = lines[lines.length - 2];

        if (last.split(/\s+/).length === 1) {
          const merged = prev + " " + last;
          if (ctxLocal.measureText(merged).width <= maxWidth * 1.12) {
            lines[lines.length - 2] = merged;
            lines.pop();
          }
        }
      }

      // 3) Rebalanceo suave entre líneas vecinas
      function widthOf(line) {
        return ctxLocal.measureText(line).width;
      }

      for (let pass = 0; pass < 2; pass++) {
        for (let i = 0; i < lines.length - 1; i++) {
          const a = lines[i];
          const b = lines[i + 1];

          const aWords = a.split(/\s+/);
          const bWords = b.split(/\s+/);

          if (bWords.length <= 1) continue;

          const aWidth = widthOf(a);
          const bWidth = widthOf(b);

          // Si la línea de arriba quedó mucho más corta, intenta subir una palabra
          if (aWidth < bWidth * 0.72) {
            const candidateA = a + " " + bWords[0];
            const candidateB = bWords.slice(1).join(" ");

            if (
              candidateB &&
              widthOf(candidateA) <= maxWidth &&
              candidateB.split(/\s+/).length >= 1
            ) {
              lines[i] = candidateA;
              lines[i + 1] = candidateB;
            }
          }
        }
      }

      return lines;
    }


/* ========= MODE: BRAT ========= */


    function drawBrat(rawText, bg) {
      ctx.save();

      const text = rawText.trim();
      if (!text) {
        ctx.restore();
        return;
      }

      const textColor = getContrastColor(bg);

      // Caja interna tipo "textOverlay"
      const boxWidth  = CANVAS_WIDTH  * 0.90; // más angosto para que no pida huecos gigantes
      const boxHeight = CANVAS_HEIGHT  * 0.98;
      const boxX = (CANVAS_WIDTH  - boxWidth) / 2;
      const boxY = (CANVAS_HEIGHT  - boxHeight) / 2;

      const maxFont = 470;
      const minFont = 20;

      let low = minFont;
      let high = maxFont;
      let bestFont = minFont;
      let bestLines = [];

      // Búsqueda binaria del tamaño de fuente (considerando estiramiento vertical)
      while (low <= high) {
        const mid = (low + high) >> 1;
        ctx.font = `${mid}px arial_narrowregular, 'Arial Narrow', sans-serif`;

        const candidateLines = wrapWordsToLines(text, boxWidth, ctx);
        const totalHeight = candidateLines.length * mid * 1.1 * BRAT_STRETCH_Y;

        // Verificar si cada palabra cabe en el ancho
        let wordTooWide = false;
        for (const line of candidateLines) {
          for (const w of line) {
            if (ctx.measureText(w).width > boxWidth) {
              wordTooWide = true;
              break;
            }
          }
          if (wordTooWide) break;
        }

        if (!wordTooWide && totalHeight <= boxHeight) {
          // Sí cabe
          bestFont = mid;
          bestLines = candidateLines;
          low = mid + 2;
        } else {
          // No cabe: letra demasiado grande para alguna palabra
          high = mid - 2;
        }

      }

      ctx.font = `${bestFont}px arial_narrowregular, 'Arial Narrow', sans-serif`;
      ctx.textBaseline = "top";
      ctx.fillStyle = textColor;

      const lineHeight = bestFont * 0.9;
      const blockHeight = bestLines.length * lineHeight * BRAT_STRETCH_Y;
      let y = boxY + (boxHeight - blockHeight) / 2;

      bestLines.forEach(words => {
        drawJustifiedLineTall(words, boxX, y, boxWidth, ctx);
        y += lineHeight * BRAT_STRETCH_Y;
      });

      ctx.restore();
    }

    function wrapWordsToLines(text, maxWidth, ctxLocal) {
      const words = text.split(/\s+/).filter(Boolean);
      const lines = [];
      let current = [];

      // --- 1. Wrap codicioso normal ---
      words.forEach(w => {
        const test = [...current, w].join(" ");
        const width = ctxLocal.measureText(test).width;
        if (width > maxWidth && current.length > 0) {
          lines.push(current);
          current = [w];
        } else {
          current.push(w);
        }
      });

      if (current.length) lines.push(current);

      // --- 2. Balanceo: evitar líneas de 1 palabra si se puede ---
      const naturalSpace = ctxLocal.measureText(" ").width;

      function lineWidth(line) {
        if (!line.length) return 0;
        const wordsWidth = line.reduce(
          (acc, w) => acc + ctxLocal.measureText(w).width,
          0
        );
        const gaps = line.length - 1;
        return wordsWidth + gaps * naturalSpace;
      }

      // Recorremos de arriba hacia abajo,
      // moviendo palabras de la siguiente línea a la actual
      for (let i = 0; i < lines.length - 1; i++) {
        let line = lines[i];
        let next = lines[i + 1];

        // Mientras esta línea tenga 1 palabra
        // y la siguiente tenga al menos 2, intentamos subir una palabra
        while (line.length === 1 && next && next.length >= 2) {
          const candidate = [...line, next[0]];
          if (lineWidth(candidate) <= maxWidth) {
            // Sí cabe: subimos la primera palabra de la siguiente línea
            line = candidate;
            next = next.slice(1);
            lines[i] = line;
            if (next.length) {
              lines[i + 1] = next;
            } else {
              // Si dejamos vacía la siguiente línea, la quitamos
              lines.splice(i + 1, 1);
              break;
            }
          } else {
            // No cabe "no está" juntos, nos quedamos como estamos
            break;
          }
        }
      }

      return lines;
    }

    function drawJustifiedLine(words, x, y, lineWidth, ctx) {
      if (!words || words.length === 0) return;

      ctx.save();
      ctx.filter = "blur(5px)";
      ctx.textBaseline = "top";

      const gaps = words.length - 1;
      const wordWidths = words.map(w => ctx.measureText(w).width);
      const wordsWidth = wordWidths.reduce((a, b) => a + b, 0);

      // Una sola palabra: no podemos justificar sin deformar → pegada a la izquierda
      if (gaps === 0) {
        ctx.fillText(words[0], x, y);
        ctx.restore();
        return;
      }

      // Espacio libre que hay que repartir en los huecos
      const freeSpace = lineWidth - wordsWidth;

      let spaceSize;
      if (freeSpace <= 0) {
        // Línea ya muy llena → usamos espacio natural
        spaceSize = ctx.measureText(" ").width;
      } else {
        // 💚 Justificado real: repartimos TODO el espacio libre entre los huecos
        spaceSize = freeSpace / gaps;
      }

      let cursorX = x;
      for (let i = 0; i < words.length; i++) {
        const w = words[i];
        ctx.fillText(w, cursorX, y);
        if (i < gaps) {
          cursorX += wordWidths[i] + spaceSize;
        }
      }

      ctx.restore();
    }

    function drawJustifiedLineTall(words, x, y, lineWidth, ctx) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(1, BRAT_STRETCH_Y);
      drawJustifiedLine(words, 0, 0, lineWidth, ctx);
      ctx.restore();

/* ========= MODE: RETRO 3D ========= */

    function layoutTextBalanced(text, boxWidth, boxHeight, ctxLocal, options = {}) {
      const cfg = {
        ...RETRO_3D_TEXT_CONFIG,
        ...options
      };

      const words = text.split(/\s+/).filter(Boolean);

      const maxFont = cfg.maxFont;
      const minFont = cfg.minFont;
      const lineHeightFactor = cfg.lineHeightFactor;
      const targetFill = cfg.layoutTargetFill;

      if (words.length === 0) return [];

      function setFont(size) {
        ctxLocal.font = `700 ${size}px 'Noto Serif', serif`;
      }

      function measureWords(lineWords, fontSize) {
        setFont(fontSize);

        const naturalSpace = ctxLocal.measureText(" ").width;
        const wordWidths = lineWords.map(w => ctxLocal.measureText(w).width);
        const wordsWidth = wordWidths.reduce((a, b) => a + b, 0);
        const gaps = lineWords.length - 1;

        return {
          naturalSpace,
          wordWidths,
          wordsWidth,
          naturalWidth: wordsWidth + naturalSpace * gaps,
          gaps
        };
      }

      function getBestFontForLine(lineWords) {
        let low = minFont;
        let high = maxFont;
        let best = minFont;

        while (low <= high) {
          const mid = Math.floor((low + high) / 2);
          const m = measureWords(lineWords, mid);

          if (m.naturalWidth <= boxWidth * targetFill) {
            best = mid;
            low = mid + 1;
          } else {
            high = mid - 1;
          }
        }

        return best;
      }

      function scoreLine(lineWords, isLastLine) {
        const fontSize = getBestFontForLine(lineWords);
        const m = measureWords(lineWords, fontSize);

        const fillRatio = m.naturalWidth / boxWidth;
        const desiredWidth = boxWidth * targetFill;

        let score = 0;

        // Queremos líneas llenas, pero no obligadas de forma absurda
        score += Math.pow(targetFill - fillRatio, 2) * cfg.fillPenalty;

        // Evita líneas de una sola palabra en frases medianas/largas
        if (lineWords.length === 1 && words.length > 4) {
          score += cfg.singleWordPenalty;
        }

        // Estilo póster: preferimos líneas de 1 a 3 palabras
        if (lineWords.length >= 4) {
          score += Math.pow(lineWords.length - 3, 2) * cfg.manyWordsPenalty;
        }

        // Evita última línea demasiado corta
        if (isLastLine && fillRatio < 0.55 && words.length > 6) {
          score += Math.pow(0.55 - fillRatio, 2) * cfg.lastLineShortPenalty;
        }

        // Penaliza huecos exagerados al justificar
        if (m.gaps > 0) {
          const rawSpace = (desiredWidth - m.wordsWidth) / m.gaps;
          const maxAllowedSpace = m.naturalSpace * cfg.maxSpaceFactor;

          if (rawSpace > maxAllowedSpace) {
            score += Math.pow(rawSpace / m.naturalSpace - cfg.maxSpaceFactor, 2) * cfg.spacePenalty;
          }
        }

        // Evita líneas demasiado pequeñas frente al objetivo visual
        if (fontSize <= minFont + 2) {
          score += cfg.minFontPenalty;
        }

        return {
          score,
          fontSize,
          fillRatio
        };
      }

      const n = words.length;

      let bestLayout = null;
      let bestScore = Infinity;

      // Rango razonable de líneas:
      // pocas palabras por línea para lograr efecto póster
      const minLines = Math.max(2, Math.ceil(n / 5));
      const maxLines = Math.min(n, Math.max(minLines, Math.ceil(n / 2) + 2));

      for (let lineCount = minLines; lineCount <= maxLines; lineCount++) {
        const dp = Array.from({ length: lineCount + 1 }, () =>
          Array(n + 1).fill(Infinity)
        );

        const prev = Array.from({ length: lineCount + 1 }, () =>
          Array(n + 1).fill(-1)
        );

        const meta = Array.from({ length: lineCount + 1 }, () =>
          Array(n + 1).fill(null)
        );

        dp[0][0] = 0;

        for (let line = 1; line <= lineCount; line++) {
          for (let end = line; end <= n; end++) {
            for (let start = line - 1; start < end; start++) {
              const lineWords = words.slice(start, end);
              const isLastLine = line === lineCount;

              const result = scoreLine(lineWords, isLastLine);
              const candidate = dp[line - 1][start] + result.score;

              if (candidate < dp[line][end]) {
                dp[line][end] = candidate;
                prev[line][end] = start;
                meta[line][end] = result;
              }
            }
          }
        }

        if (dp[lineCount][n] === Infinity) continue;

        const lines = [];
        let end = n;

        for (let line = lineCount; line >= 1; line--) {
          const start = prev[line][end];

          if (start < 0) {
            lines.length = 0;
            break;
          }

          const lineWords = words.slice(start, end);
          const result = meta[line][end];

          lines.unshift({
            text: lineWords.join(" "),
            words: lineWords,
            fontSize: result.fontSize,
            fillRatio: result.fillRatio
          });

          end = start;
        }

        if (!lines.length) continue;

        const totalHeight = lines.reduce((acc, item) => {
          return acc + item.fontSize * lineHeightFactor;
        }, 0);

        if (totalHeight > boxHeight) continue;

        // Permite tamaños diferentes, pero evita saltos demasiado violentos
        let jumpPenalty = 0;

        for (let i = 0; i < lines.length - 1; i++) {
          const a = lines[i].fontSize;
          const b = lines[i + 1].fontSize;

          const ratio = Math.max(a, b) / Math.min(a, b);

          if (ratio > cfg.maxJumpRatio) {
            jumpPenalty += Math.pow(ratio - cfg.maxJumpRatio, 2) * 100;
          }
        }

        // Premia que haya variación de tamaños tipo póster
        const sizes = lines.map(l => l.fontSize);
        const maxSize = Math.max(...sizes);
        const minSizeFound = Math.min(...sizes);
        const variation = maxSize / minSizeFound;

        let variationBonus = 0;

        if (variation > cfg.variationBonusMin && variation < cfg.variationBonusMax) {
          variationBonus = cfg.variationBonus;
        }

        const finalScore = dp[lineCount][n] + jumpPenalty + variationBonus;

        if (finalScore < bestScore) {
          bestScore = finalScore;
          bestLayout = lines;
        }
      }

      // Fallback seguro
      if (!bestLayout) {
        return [
          {
            text,
            words,
            fontSize: minFont,
            fillRatio: 1
          }
        ];
      }

      return bestLayout;
    }




    function drawRetro3D(rawText, bg) {
      const cfg = RETRO_3D_TEXT_CONFIG;

      ctx.save();

      const text = rawText
        .trim()
        .replace(/([,;:.!?])(\S)/g, "$1 $2");

      if (!text) {
        ctx.restore();
        return;
      }

      const normalizedBg = getRetro3DBackground(bg);

      // Fondo principal
      ctx.fillStyle = normalizedBg;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // Fondo compuesto en canvas aparte
      const bgCanvas = document.createElement("canvas");
      bgCanvas.width = CANVAS_WIDTH;
      bgCanvas.height = CANVAS_HEIGHT;

      const bgCtx = bgCanvas.getContext("2d");

      bgCtx.fillStyle = normalizedBg;
      bgCtx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      drawRetroPattern(bgCtx, normalizedBg);
      addGrain(bgCtx, 14);

      ctx.drawImage(bgCanvas, 0, 0);

      drawRetroLines();

      // Caja visual del texto
      const boxWidth = CANVAS_WIDTH * cfg.boxWidthRatio;
      const boxHeight = CANVAS_HEIGHT * cfg.boxHeightRatio;

      const centerX = CANVAS_WIDTH / 2;
      const centerY = CANVAS_HEIGHT * cfg.centerYRatio;

      const lines = layoutTextBalanced(text, boxWidth, boxHeight, ctx, {
        maxFont: cfg.maxFont,
        minFont: cfg.minFont,
        lineHeightFactor: cfg.lineHeightFactor,
        layoutTargetFill: cfg.layoutTargetFill
      });

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const palette = getRetro3DPalette(normalizedBg);

      const totalHeight = lines.reduce((acc, item) => {
        return acc + item.fontSize * cfg.lineHeightFactor;
      }, 0);

      let y = centerY - totalHeight / 2;

      for (let i = 0; i < lines.length; i++) {
        const item = lines[i];

        const lineHeight = item.fontSize * cfg.lineHeightFactor;

        y += lineHeight / 2;

        drawRetro3DLine(item.text, centerX, y, {
          frontColor: palette.frontColor,
          midColor: palette.midColor,
          shadowColor: palette.shadowColor,
          fontSize: item.fontSize,
          boxWidth,
          targetFill: cfg.drawTargetFill,
          justify: cfg.justify,
          minSpaceFactor: cfg.minSpaceFactor,
          maxSpaceFactor: cfg.maxSpaceFactor
        });

        y += lineHeight / 2;
      }

      ctx.restore();
    }


    function drawRetro3DLine(line, x, y, opts) {
      const cfg = {
        ...RETRO_3D_TEXT_CONFIG,
        ...opts
      };

      const {
        frontColor,
        midColor,
        shadowColor,
        fontSize,
        boxWidth,
        targetFill,
        justify,
        minSpaceFactor,
        maxSpaceFactor
      } = cfg;

      const depth = Math.max(4, Math.round(fontSize * 0.045));
      const words = line.split(/\s+/).filter(Boolean);

      if (!words.length) return;

      const targetW = boxWidth * targetFill;

      ctx.save();

      ctx.font = `700 ${fontSize}px 'Noto Serif', serif`;
      ctx.textBaseline = "middle";

      const wordWidths = words.map(w => ctx.measureText(w).width);
      const totalWordsW = wordWidths.reduce((a, b) => a + b, 0);
      const gaps = words.length - 1;

      const naturalSpace = ctx.measureText(" ").width;
      const minSpace = naturalSpace * minSpaceFactor;
      const maxSpace = naturalSpace * maxSpaceFactor;

      let spaceSize = naturalSpace;

      if (gaps > 0 && justify) {
        const rawSpace = (targetW - totalWordsW) / gaps;
        spaceSize = Math.max(minSpace, Math.min(rawSpace, maxSpace));
      }

      const actualLineW = totalWordsW + spaceSize * gaps;

      function getExtrudeColor(i) {
        const t = i / depth;

        if (t > 0.70) return shadowColor;
        if (t > 0.40) return midColor;

        return shadowColor;
      }

      function drawWord(word, wx) {
        ctx.textAlign = "left";

        for (let i = depth; i >= 1; i--) {
          ctx.fillStyle = getExtrudeColor(i);
          ctx.fillText(word, wx + i, y + i);
        }

        ctx.fillStyle = frontColor;
        ctx.fillText(word, wx, y);
      }

      // Si la línea tiene una sola palabra, se centra.
      // No se puede justificar una sola palabra sin deformarla.
      if (gaps === 0) {
        ctx.textAlign = "center";

        for (let i = depth; i >= 1; i--) {
          ctx.fillStyle = getExtrudeColor(i);
          ctx.fillText(words[0], x + i, y + i);
        }

        ctx.fillStyle = frontColor;
        ctx.fillText(words[0], x, y);

        ctx.restore();
        return;
      }

      let cursorX = x - actualLineW / 2;

      for (let i = 0; i < words.length; i++) {
        drawWord(words[i], cursorX);
        cursorX += wordWidths[i] + spaceSize;
      }

      ctx.restore();
    }















    function drawCornerTagRetro3D() {
      const tag = "@monacastrosa";

      ctx.save();

      const padding = 35;
      const x = CANVAS_WIDTH / 2;
      const y = 35;

      const normalizedBg = getRetro3DBackground(bgColorInput.value);

      const depth = 3; // grosor del volumen

      ctx.font = `700 ${fontSize}px 'Noto Serif', serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      for (let i = depth; i >= 1; i--) {
        const t = i / depth;

        let extrudeColor;
        if (t > 2/3) {
          extrudeColor = palette.shadowColor;
        } else if (t > 1/3) {
          extrudeColor = palette.frontColor;
        } else {
          extrudeColor = palette.shadowColor;
        }

        ctx.fillStyle = extrudeColor;
        ctx.fillText(tag, x + i, y + i);

      ctx.fillStyle = palette.frontColor;

    function drawRetroLines() {
      ctx.save();

      const normalizedBg = getRetro3DBackground(bgColorInput.value);
      const palette = getRetro3DPalette(normalizedBg);

      const margin = 38;
      const len = 120;
      const depth = 6;

      ctx.lineCap = "square";
      ctx.lineWidth = 10;

      function drawCornerLines(paths, front, shadow) {
        // capas de extrusión (igual que drawRetro3DLine)
        for (let i = depth; i >= 1; i--) {
          const t = i / depth;

          let extrudeColor;
          if (t > 0.7) {
            extrudeColor = shadow;
          } else if (t > 0.4) {
            extrudeColor = front; // midColor = frontColor en tu paleta
          } else {
            extrudeColor = shadow;
          }

          ctx.strokeStyle = extrudeColor;
          ctx.beginPath();
          for (const [mx, my, lx, ly] of paths) {
            ctx.moveTo(mx + i, my + i);
            ctx.lineTo(lx + i, ly + i);
          }
          ctx.stroke();
        }

        // cara frontal
        ctx.strokeStyle = front;
        ctx.beginPath();
        for (const [mx, my, lx, ly] of paths) {
          ctx.moveTo(mx, my);
          ctx.lineTo(lx, ly);
        }
        ctx.stroke();
      }

      const front  = palette.frontColor;
      const shadow = palette.shadowColor;

      // esquina superior derecha: dos segmentos (horizontal + vertical)
      drawCornerLines([
        [CANVAS_WIDTH - margin - len, margin, CANVAS_WIDTH - margin, margin],       // horizontal
        [CANVAS_WIDTH - margin,       margin, CANVAS_WIDTH - margin, margin + len]  // vertical
      ], front, shadow);

      // esquina inferior izquierda
      drawCornerLines([
        [margin, CANVAS_HEIGHT - margin - len, margin, CANVAS_HEIGHT - margin],       // vertical
        [margin, CANVAS_HEIGHT - margin,       margin + len, CANVAS_HEIGHT - margin]  // horizontal
      ], front, shadow);

      ctx.restore();
    }

    function drawAEStyleText() {
      const textLines = ["\u00A0MONA", "\u00A0\u00A0\u00A0\u00A0CASTROSA"];

      // ==================================================
      // 1. Canvas temporal para fabricar el STROKE OUTSIDE
      // ==================================================
      const temp = document.createElement("canvas");
      temp.width = CANVAS_WIDTH;
      temp.height = CANVAS_HEIGHT;
      const tctx = temp.getContext("2d");

      const x = CANVAS_WIDTH / 2 + 220;  // << mueve todo a la derecha
      const y = CANVAS_HEIGHT * 0.78 - 15;

      const fontSize = 90;
      const lineSpacing = fontSize * 0.9;

      tctx.font = `${fontSize}px 'OPTICashew-ExtraBold'`;
      tctx.textAlign = "center";
      tctx.textBaseline = "middle";
      tctx.globalAlpha = 1.0; // alpha se aplica luego

      // -------------- Stroke total (dentro y fuera) --------------
      tctx.strokeStyle = "black";
      tctx.lineWidth = 16;  // equivalente aproximado a StrokeWidth=8 de AE

      for (let i = 0; i < textLines.length; i++) {
        const ly = y + (i - 0.5) * lineSpacing;
        tctx.strokeText(textLines[i], x, ly);
      }

      // -------------- Borrar interior (solo deja fuera) --------------
      tctx.globalCompositeOperation = "destination-out";

      for (let i = 0; i < textLines.length; i++) {
        const ly = y + (i - 0.5) * lineSpacing;
        tctx.fillText(textLines[i], x, ly);
      }

      // ==================================================
      // 2. Canvas final para sombra + relleno (como AE)
      // ==================================================
      const finalCanvas = document.createElement("canvas");
      finalCanvas.width = CANVAS_WIDTH ;
      finalCanvas.height = CANVAS_HEIGHT ;
      const fctx = finalCanvas.getContext("2d");

      // -------- Sombra estilo After Effects --------
      fctx.shadowColor = "rgba(0,0,0,0.80)";   // parecido a opacityPct:128
      fctx.shadowBlur = 5;                     // softness=5
      fctx.shadowOffsetX = 4;                 // dirección 135°
      fctx.shadowOffsetY = 4;                  // distancia 6 px aprox

      // borde externo con sombra
      fctx.drawImage(temp, 0, 0);

      // quitar sombra antes del relleno
      fctx.shadowBlur = 0;

      // -------- Relleno blanco --------
      fctx.globalAlpha = 1.0;
      fctx.fillStyle = "white";
      fctx.font = `${fontSize}px 'OPTICashew-ExtraBold'`;
      fctx.textAlign = "center";
      fctx.textBaseline = "middle";

      for (let i = 0; i < textLines.length; i++) {
        const ly = y + (i - 0.5) * lineSpacing;
        fctx.fillText(textLines[i], x, ly);
      }

      // ==================================================
      // 3. Alpha global bajo (marca de agua) y draw final
      // ==================================================
      ctx.save();
      ctx.globalAlpha = 0.06;   // <<<<<< EXACTO como pediste
      ctx.drawImage(finalCanvas, 0, 0);
      ctx.restore();
    }

    function drawRetroPattern(targetCtx, bg) {
      const palette = getRetro3DPalette(bg);
      let patternColor;
      let alpha;
      if (bg.toLowerCase() === "#0d0f14") { // negro
        patternColor = palette.frontColor;
        alpha = 0.1;
      } else if (bg.toLowerCase() === "#f6f1e8") { // blanco crema
        patternColor = "#7f7a72"; // gris cálido
        alpha = 0.2;
      } else if (bg.toLowerCase() === "#f4c400") { // amarillo
        patternColor = "#8c2f2f"; // rojo oscuro
        alpha = 0.2;
      } else if (bg.toLowerCase() === "#3d5afe") { // azul
        patternColor = "#f4c400"; // amarillo
        alpha = 0.2;
      } else { // fallback (rojo u otros)
        patternColor = "#f4c400"; // amarillo
        alpha = 0.3;
      }

      targetCtx.save();
      targetCtx.fillStyle = hexToRgba(patternColor, alpha);
      targetCtx.font = "700 26px 'Noto Serif', serif";
      targetCtx.textAlign = "left";
      targetCtx.textBaseline = "middle";

      const text = "@monacastrosa";
      const amplitude = 10;

      const charWidths = [];
      for (const ch of text) {
        charWidths.push(targetCtx.measureText(ch).width);
      }
      const totalTextWidth = charWidths.reduce((a, b) => a + b, 0);

      // horizontal tileable
      const reps = Math.round(CANVAS_WIDTH / (totalTextWidth + 10));
      const stepX = CANVAS_WIDTH / reps;
      const scale = stepX / totalTextWidth;

      // sampleStep proporcional al ancho medio de carácter
      const avgCharWidth = (totalTextWidth / text.length) * scale;
      const sampleStep = Math.max(2, avgCharWidth * 0.5);

      // vertical tileable
      const rowsCount = Math.round(CANVAS_HEIGHT / 28);
      const stepY = CANVAS_HEIGHT / rowsCount;

      // arranca un paso antes para cubrir borde superior con cualquier amplitude
      const startY = -(stepY + amplitude);

      for (
        let row = 0, baseY = startY;
        baseY < CANVAS_HEIGHT + stepY + amplitude;
        row++, baseY += stepY
      ) {
        const rowShift = (row % 2) * (stepX / 2);
        const startX = -stepX / 2 + rowShift;

        for (let tileX = startX; tileX < CANVAS_WIDTH + stepX; tileX += stepX) {
          let cursorX = tileX;

          for (let i = 0; i < text.length; i++) {
            const ch = text[i];
            const cw = charWidths[i] * scale;
            const cx = cursorX + cw / 2;

            const waveY =
              baseY + Math.sin((2 * Math.PI * cx) / CANVAS_WIDTH) * amplitude;

            const waveYNext =
              baseY + Math.sin((2 * Math.PI * (cx + sampleStep)) / CANVAS_WIDTH) * amplitude;

            const angle = Math.atan2(waveYNext - waveY, sampleStep);

            targetCtx.save();
            targetCtx.translate(cx, waveY);
            targetCtx.rotate(angle);
            targetCtx.scale(scale, 1);
            targetCtx.fillText(ch, -charWidths[i] / 2, 0);
            targetCtx.restore();

            cursorX += cw;
          }
        }
      }

      targetCtx.restore();
    }






    function addGrain(targetCtx, amount = 15) {
      const imageData = targetCtx.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const noise = (Math.random() - 0.5) * amount;

        data[i]     += noise;
        data[i + 1] += noise;
        data[i + 2] += noise;
      }

      targetCtx.putImageData(imageData, 0, 0);
    }

    function getContrastColor(hex) {
      hex = hex.replace("#", "");
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      return brightness > 150 ? "#000000" : "#ffffff";
    }

    function getBrightness(hex) {
      hex = hex.replace("#", "");
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      return (r * 299 + g * 587 + b * 114) / 1000;
    }

    function getRetro3DBackground(hex) {
      const retroYellow = "#f4c400";
      const retroBlue   = "#3d5afe";
      const retroRed    = "#e53935";
      const retroWhite  = "#f6f1e8";
      const retroBlack  = "#0d0f14";

      const input = hexToRgb(hex);

      const whiteDistance =
        Math.pow(input.r - 255, 2) +
        Math.pow(input.g - 255, 2) +
        Math.pow(input.b - 255, 2);

      if (whiteDistance < 2000) {
        return retroWhite;
      }

      const blackDistance =
        Math.pow(input.r - 10, 2) +
        Math.pow(input.g - 10, 2) +
        Math.pow(input.b - 10, 2);

      if (blackDistance < 2000) {
        return retroBlack;
      }

      const targetColors = [retroYellow, retroBlue, retroRed];

      let nearest = targetColors[0];
      let minDistance = Infinity;

      for (const color of targetColors) {
        const c = hexToRgb(color);
        const distance =
          Math.pow(input.r - c.r, 2) +
          Math.pow(input.g - c.g, 2) +
          Math.pow(input.b - c.b, 2);

        if (distance < minDistance) {
          minDistance = distance;
          nearest = color;
        }
      }

      return nearest;
    }

    function getRetro3DPalette(bg) {
      const retroYellow = "#f4c400";
      const retroBlue   = "#3d5afe";
      const retroRed    = "#e53935";
      const retroWhite  = "#f6f1e8";
      const retroBlack  = "#0d0f14";
      
      if (bg.toLowerCase() === retroBlack) {
        return {
          frontColor: "#39ff14",
          midColor: "#39ff14",
          shadowColor: "#c600eb",
        };
      }

      if (bg.toLowerCase() === retroWhite) {
        return {
          frontColor: "#ff2bd6",
          midColor: "#ff2bd6",
          shadowColor: "#39ff14",
        };
      }

      if (bg.toLowerCase() === retroYellow) {
        return {
          frontColor: retroBlue,
          midColor: retroBlue,
          shadowColor: retroRed,
        };
      }

      if (bg.toLowerCase() === retroBlue) {
        return {
          frontColor: retroRed,
          midColor: retroRed,
          shadowColor: retroYellow,
        };
      }

      // fondo rojo
      return {
        frontColor: retroYellow,
        midColor: retroYellow,
        shadowColor: retroBlue,
      };
    }
    
    function hexToRgb(hex) {
      hex = hex.replace("#", "");
      return {
        r: parseInt(hex.slice(0, 2), 16),
        g: parseInt(hex.slice(2, 4), 16),
        b: parseInt(hex.slice(4, 6), 16)
      };
    }

    function hexToRgba(hex, alpha) {
      const { r, g, b } = hexToRgb(hex);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }







    function getCanvasBase64() {
      return canvas.toDataURL("image/png");
    }

    window.getCanvasBase64 = getCanvasBase64;
    window.draw = draw;
    window.assetsReady = assetsReady;



  
  </script>
