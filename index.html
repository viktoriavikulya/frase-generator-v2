<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mono Generator 🐵</title>

  <!-- Felt Tip Roman (modo normal) -->
  <link href="https://fonts.cdnfonts.com/css/felt-tip-roman" rel="stylesheet">

  <!-- Noto Serif para modo Retro 3D -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&display=swap" rel="stylesheet">

  <!-- Preload de la fuente oficial Brat (Arial Narrow real) -->
  <link rel="preload"
        href="https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff"
        as="font"
        type="font/woff"
        crossorigin>

  <!-- Fuente oficial Brat: Arial Narrow REAL -->
  <style>
    @font-face {
      font-family: 'arial_narrowregular';
      src: url('https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
  </style>

  <style>
    @font-face {
      font-family: 'OPTICashew-ExtraBold';
      src: url('assets/OPTICashew-ExtraBold.woff') format('woff');
      font-weight: 800;
    }
  </style>

  <!-- Tailwind para layout de controles -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --controls-h: 110px;
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
    }

    body {
      background: #111;
      margin: 0;
      color: #fff;
      font-family: 'Felt Tip Roman', cursive;
      overflow: hidden;
    }

    /* Área de preview */
    #stage {
      height: calc(100vh - var(--controls-h));
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #previewCanvas {
      width: min(90vw, 90vh);
      height: min(90vw, 90vh);
      box-shadow: 0 8px 3px rgba(0,0,0,0.35);
      border-radius: 25px;
      background: #fff;
      display: block;
    }

    /* Panel de control inferior */
    .control-panel {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: var(--controls-h);
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      z-index: 20;
      padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
    }

    #multiBtn {
      margin-bottom: calc(env(safe-area-inset-bottom) + 90px);
    }

    /* Switch tipo iPhone */
    .switch {
      position: relative;
      width: 55px;
      height: 28px;
    }
    .switch input { display: none; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #555;
      transition: .3s;
      border-radius: 34px;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #22c55e; }
    input:checked + .slider:before { transform: translateX(26px); }

    /* Input de color */
    #bgColor {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 999px;
      border: none;
      overflow: hidden;
    }
    #bgColor::-webkit-color-swatch,
    #bgColor::-moz-color-swatch {
      border: none;
      border-radius: 999px;
    }

    /* =========================================
              RESPONSIVE PARA CELULARES
       ========================================= */
    @media (max-width: 480px) {
      :root { --controls-h: 160px; }

      .control-panel {
        height: var(--controls-h);
        flex-direction: column;
        gap: 10px;
        padding: 10px 8px;
      }

      .control-panel > div:nth-child(2) {
        display: flex;
        flex-direction: column;
        gap: 8px !important;
        width: 100%;
        padding: 0 10px;
      }

      #textInput {
        width: 100% !important;
        font-size: 16px !important;
        padding: 8px !important;
      }

      #downloadBtn {
        width: 100%;
        padding: 8px !important;
        font-size: 14px !important;
      }

      #bgColor {
        width: 28px !important;
        height: 28px !important;
      }
    }
  </style>

</head>
<body>

  <main id="stage">
    <canvas id="previewCanvas" width="1080" height="1350"></canvas>
  </main>

  <!-- Controles -->
  <div class="control-panel">
    <!-- Modo -->
    <div class="flex items-center justify-center gap-3 text-sm">
      <span>Modo:</span>
      <select id="modeSelect" class="text-black rounded-lg px-3 py-1 font-bold">
        <option value="normal">Normal</option>
        <option value="brat">Brat</option>
        <option value="retro3d">3D Retro</option>
      </select>
    </div>

    <!-- Texto + fondo + botón -->
    <div class="flex items-center justify-center gap-3 w-full px-3">
      <input
        id="textInput"
        type="text"
        placeholder="Escribe tu frase..."
        class="flex-1 p-2 rounded-lg text-black text-center font-bold text-lg outline-none"
      >

      <div class="flex items-center gap-1 text-sm">
        <span>Fondo:</span>
        <input type="color" id="bgColor" value="#ffffff">
      </div>

      <button
        id="downloadBtn"
        class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 active:bg-indigo-800"
      >
        Descargar PNG
      </button>
    </div>
  </div>

  <!-- Scripts: el orden importa -->
  <script src="js/config.js"></script>
  <script src="js/palettes.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/mode-normal.js"></script>
  <script src="js/mode-brat.js"></script>
  <script src="js/mode-retro3d.js"></script>
  <script src="js/branding.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
